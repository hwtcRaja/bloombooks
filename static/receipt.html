<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BloomBooks Mobile</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#0f6e56;--teal2:#1a8a6c;--teal3:#e1f5ee;
  --cream:#faf8f3;--ink:#1e1e1b;--ink2:#4a4a45;--ink3:#888880;
  --border:#dddad0;--red:#b53030;--red-bg:#fdf0f0;
  --green:#2d7d4f;--green-bg:#edf7f2;
  --amber:#c97c10;--amber-bg:#fef3e2;
  --r:10px;--r-sm:7px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;padding-bottom:48px}

/* Header */
.header{background:var(--ink);padding:14px 16px 12px;position:sticky;top:0;z-index:20}
.header-inner{display:flex;align-items:center;gap:10px}
.header-title{color:#fff;font-size:17px;font-weight:700;letter-spacing:-.2px}
.header-sub{color:rgba(255,255,255,.45);font-size:11px;margin-top:1px}

/* Tab bar */
.tab-bar{background:#fff;border-bottom:1px solid var(--border);display:flex;position:sticky;top:52px;z-index:19}
.tab-btn{flex:1;padding:13px 8px;border:none;background:none;font-size:14px;font-weight:500;color:var(--ink3);cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.tab-btn.active{color:var(--teal);border-bottom-color:var(--teal);font-weight:600}

.content{padding:16px;max-width:480px;margin:0 auto}

/* User greeting */
.user-greeting{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.user-av{width:36px;height:36px;border-radius:50%;background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.user-name{font-weight:600;font-size:15px}
.user-sub{font-size:12px;color:var(--ink3);margin-top:2px}

/* Cards */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px;overflow:hidden}
.card-label{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.6px;padding:12px 14px 0}
.card-body{padding:12px 14px 14px}

/* Forms */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--ink2);margin-bottom:5px}
.req{color:var(--red)}
.form-input,.form-select,.form-textarea{width:100%;padding:11px 13px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:15px;color:var(--ink);background:#fff;outline:none;-webkit-appearance:none;appearance:none;font-family:inherit}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(15,110,86,.1)}
.form-textarea{resize:vertical;min-height:72px}
.form-hint{font-size:12px;color:var(--ink3);margin-top:4px}
.form-error{color:var(--red);font-size:13px;margin-top:4px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* Type toggle */
.type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.type-opt{border:2px solid var(--border);border-radius:var(--r-sm);padding:11px 12px;cursor:pointer;transition:all .15s}
.type-opt.active-pre{border-color:var(--teal);background:var(--teal3)}
.type-opt.active-sap{border-color:var(--amber);background:var(--amber-bg)}
.type-opt-title{font-weight:600;font-size:13px;margin-bottom:2px}
.type-opt-sub{font-size:11px;color:var(--ink3)}

/* Method toggle */
.method-toggle{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.method-opt{border:2px solid var(--border);border-radius:var(--r-sm);padding:10px 12px;cursor:pointer;transition:all .15s}
.method-opt.active{border-color:var(--teal);background:var(--teal3)}

/* Request cards */
.req-card{border:2px solid var(--border);border-radius:var(--r-sm);padding:13px 14px;margin-bottom:10px;cursor:pointer;transition:all .15s}
.req-card.selected{border-color:var(--teal);background:var(--teal3)}
.req-card-title{font-weight:600;font-size:14px;margin-bottom:3px}
.req-card-meta{font-size:12px;color:var(--ink3)}
.status-pill{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;margin-left:6px}
.sp-pending{background:var(--amber-bg);color:#8a5a10}
.sp-approved{background:var(--green-bg);color:var(--green)}

/* Upload */
.upload-zone{border:2.5px dashed var(--border);border-radius:var(--r-sm);padding:24px 14px;text-align:center;cursor:pointer;background:var(--cream);transition:all .15s}
.upload-zone.has-file{border-color:var(--teal);background:var(--teal3)}
.upload-icon{font-size:32px;margin-bottom:6px}
.upload-text{font-size:14px;font-weight:500;color:var(--ink2);margin-bottom:3px}
.upload-sub{font-size:12px;color:var(--ink3)}
input[type=file]{display:none}
.preview-wrap{margin-top:10px;border-radius:8px;overflow:hidden;max-height:200px;display:flex;align-items:center;justify-content:center;background:#000}
.preview-wrap img{max-width:100%;max-height:200px;object-fit:contain}

/* Buttons */
.btn-primary{width:100%;padding:15px;background:var(--teal);color:#fff;border:none;border-radius:var(--r-sm);font-size:16px;font-weight:700;cursor:pointer;transition:background .15s}
.btn-primary:active{background:var(--teal2)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}

/* States */
.loading{text-align:center;padding:64px 20px;color:var(--ink3)}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.error-state,.success-state{text-align:center;padding:52px 20px}
.big-icon{font-size:48px;margin-bottom:14px}
.success-state h2{font-size:21px;font-weight:700;color:var(--green);margin-bottom:8px}
.success-state p{font-size:14px;color:var(--ink3);line-height:1.6}
.btn-another{margin-top:20px;display:inline-block;padding:12px 28px;background:var(--teal);color:#fff;border-radius:var(--r-sm);font-size:14px;font-weight:600;border:none;cursor:pointer;width:100%}
.empty-note{text-align:center;padding:20px;color:var(--ink3);font-size:13px;border:1px dashed var(--border);border-radius:var(--r-sm)}
.training-warn{background:var(--amber-bg);border:1px solid #f0c97a;border-radius:var(--r-sm);padding:12px 14px;margin-bottom:14px;font-size:13px;color:#7a4e0a}

/* Divider */
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <svg width="26" height="34" viewBox="0 0 68 108" xmlns="http://www.w3.org/2000/svg" style="flex-shrink:0">
      <rect x="0" y="0" width="66" height="106" rx="3" fill="#ece8e0"/>
      <rect x="6" y="8" width="54" height="90" rx="2" fill="none" stroke="#ccc9be" stroke-width="1"/>
      <rect x="17" y="13" width="30" height="12" rx="2" fill="#d4c87a"/>
      <text x="32" y="22" text-anchor="middle" font-family="Georgia,serif" font-size="6.5" font-weight="700" fill="#4a3e18" letter-spacing="1">108</text>
      <rect x="9" y="30" width="48" height="56" rx="2" fill="#faf8f3" stroke="#d0ccc0" stroke-width="0.8"/>
      <text x="33" y="50" text-anchor="middle" font-family="Georgia,serif" font-size="7" font-weight="700" fill="#8a7a2a" letter-spacing="1">BLOOM</text>
      <text x="33" y="60" text-anchor="middle" font-family="Georgia,serif" font-size="7" font-weight="700" fill="#8a7a2a" letter-spacing="1">BOOKS</text>
      <rect x="19" y="92" width="26" height="5" rx="1.5" fill="#c4c0b8"/>
    </svg>
    <div>
      <div class="header-title">BloomBooks</div>
      <div class="header-sub" id="header-name">Loading...</div>
    </div>
  </div>
</div>

<div class="tab-bar" id="tab-bar" style="display:none">
  <button class="tab-btn active" id="tab-receipt" onclick="switchTab('receipt')" style="font-size:12px">📎 Receipt</button>
  <button class="tab-btn" id="tab-new" onclick="switchTab('new')" style="font-size:12px">➕ Request</button>
  <button class="tab-btn" id="tab-statements" onclick="switchTab('statements')" style="font-size:12px">📋 Statements</button>
</div>

<div class="content" id="main-content">
  <div class="loading"><div class="spinner"></div>Loading...</div>
</div>

<script>
const token   = location.pathname.split('/receipt/')[1];
let pageData  = null;
let activeTab = 'receipt';

const REIMB_METHODS = ['Venmo','Cash App','Zelle','PayPal','Direct Check'];
const REIMB_LABELS  = {'Venmo':'Venmo @username','Cash App':'$Cashtag','Zelle':'Phone or email','PayPal':'PayPal email','Direct Check':'Mailing address'};

// Receipt tab state
let receiptSelectedFile = null;
let receiptSelectedId   = null;

// New request tab state
let newMethod = 'in_store';
let newType   = 'pre_approval';
let newFile   = null;

// Statement tab state
let currentStatementId = null;
let statementItemMethod = 'in_store';
let statementItemType   = 'pre_approval';

async function init() {
  showLoading();
  try {
    const r = await fetch(`/api/receipt/${token}`);
    const d = await r.json();
    if (!r.ok) { showError(d.error || 'Invalid link'); return; }
    pageData = d;
    document.getElementById('header-name').textContent = d.user.name;
    document.getElementById('tab-bar').style.display = 'flex';
    renderTab();
  } catch(e) {
    showError('Could not load. Check your connection and try again.');
  }
}

function switchTab(tab) {
  activeTab = tab;
  ['receipt','new','statements'].forEach(t => {
    document.getElementById(`tab-${t}`)?.classList.toggle('active', t===tab);
  });
  renderTab();
}

function renderTab() {
  if (activeTab === 'receipt')    renderReceiptTab();
  else if (activeTab === 'new')   renderNewRequestTab();
  else                            renderStatementsTab();
}

// ══════════════════════════════════════════════
// RECEIPT TAB
// ══════════════════════════════════════════════
function renderReceiptTab() {
  const u = pageData.user;
  const reqs = pageData.requests;
  const reqCards = reqs.length === 0
    ? `<div class="empty-note">No open requests found.<br>Submit a request using the ➕ tab first.</div>`
    : reqs.map(r => {
        const approved = r.status === 'approved';
        const statusLabel = r.status.replace('pending_','Awaiting ').replace('_',' ');
        const amt = r.actual_cost || r.estimated_cost;
        return `<div class="req-card" id="rcard-${r.id}" onclick="selectReceiptRequest(${r.id},${amt})">
          <div class="req-card-title">${r.title}</div>
          <div class="req-card-meta">$${parseFloat(amt).toFixed(2)}${r.vendor?' · '+r.vendor:''}
            <span class="status-pill ${approved?'sp-approved':'sp-pending'}">${statusLabel}</span>
          </div>
        </div>`;
      }).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="user-greeting">
      <div class="user-av">${u.name.charAt(0).toUpperCase()}</div>
      <div><div class="user-name">${u.name}</div><div class="user-sub">Select a request to attach a receipt</div></div>
    </div>
    <div class="card"><div class="card-label">Select request</div><div class="card-body" style="padding-top:8px">${reqCards}</div></div>
    <div id="receipt-form" style="display:none">
      <div class="card"><div class="card-label">Receipt photo</div><div class="card-body">
        <div class="upload-zone" id="r-upload-zone" onclick="document.getElementById('r-file-input').click()">
          <div class="upload-icon">📷</div>
          <div class="upload-text">Take photo or choose file</div>
          <div class="upload-sub">JPG, PNG, or PDF</div>
        </div>
        <input type="file" id="r-file-input" accept="image/*,application/pdf" onchange="handleReceiptFile(this)">
        <div id="r-preview"></div>
      </div></div>
      <div class="card"><div class="card-label">Details</div><div class="card-body">
        <div class="two-col">
          <div class="form-group"><label class="form-label">Estimated</label>
            <input type="text" id="r-estimated" class="form-input" readonly style="background:var(--cream);color:var(--ink3)"></div>
          <div class="form-group"><label class="form-label">Actual <span class="req">*</span></label>
            <input type="number" id="r-actual" class="form-input" placeholder="0.00" step="0.01" min="0"></div>
        </div>
        <div class="form-group"><label class="form-label">Note (optional)</label>
          <textarea id="r-note" class="form-textarea" placeholder="Any details..."></textarea></div>
      </div></div>
      <div id="r-error" class="form-error" style="margin-bottom:10px;display:none"></div>
      <button class="btn-primary" id="r-submit-btn" onclick="submitReceipt()">Submit Receipt</button>
    </div>`;
}

function selectReceiptRequest(id, amt) {
  receiptSelectedId = id;
  pageData.requests.forEach(r => document.getElementById(`rcard-${r.id}`)?.classList.toggle('selected', r.id===id));
  document.getElementById('receipt-form').style.display = 'block';
  document.getElementById('r-estimated').value = '$'+parseFloat(amt).toFixed(2);
  document.getElementById('r-actual').value    = parseFloat(amt).toFixed(2);
  document.getElementById('receipt-form').scrollIntoView({behavior:'smooth',block:'start'});
}

function handleReceiptFile(input) {
  const file = input.files[0]; if (!file) return;
  receiptSelectedFile = file;
  document.getElementById('r-upload-zone').classList.add('has-file');
  const preview = document.getElementById('r-preview');
  if (file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = e => { preview.innerHTML=`<div class="preview-wrap"><img src="${e.target.result}"></div>`; };
    reader.readAsDataURL(file);
  } else {
    preview.innerHTML=`<div style="margin-top:8px;padding:9px 12px;background:var(--teal3);border-radius:var(--r-sm);font-size:13px;color:var(--teal)">✓ ${file.name}</div>`;
  }
}

async function submitReceipt() {
  const actual = document.getElementById('r-actual').value;
  const note   = document.getElementById('r-note').value.trim();
  const errEl  = document.getElementById('r-error');
  const btn    = document.getElementById('r-submit-btn');
  errEl.style.display='none';
  if (!receiptSelectedId){ showRErr('Please select a request.'); return; }
  if (!receiptSelectedFile){ showRErr('Please attach a receipt photo.'); return; }
  if (!actual){ showRErr('Please enter the actual amount.'); return; }
  btn.disabled=true; btn.textContent='Submitting...';
  const fd=new FormData();
  fd.append('request_id',receiptSelectedId); fd.append('actual_cost',actual);
  fd.append('note',note); fd.append('file',receiptSelectedFile);
  try {
    const r=await fetch(`/api/receipt/${token}/submit`,{method:'POST',body:fd});
    const d=await r.json();
    if (!r.ok){showRErr(d.error||'Submission failed');btn.disabled=false;btn.textContent='Submit Receipt';return;}
    showSuccess('receipt');
  } catch(e){showRErr('Network error — please try again.');btn.disabled=false;btn.textContent='Submit Receipt';}
}
function showRErr(msg){const e=document.getElementById('r-error');e.textContent=msg;e.style.display='block';}

// ══════════════════════════════════════════════
// NEW REQUEST TAB
// ══════════════════════════════════════════════
function renderNewRequestTab() {
  const u = pageData.user;
  const budgets = pageData.budgets||[];
  const trained = u.training_complete;
  let budgetOpts = '<option value="">Select department / budget...</option>';
  const byProd={},orgBudgets=[];
  for (const b of budgets) {
    if (b.production_id){
      if (!byProd[b.production_id]) byProd[b.production_id]={name:b.production_name,items:[]};
      byProd[b.production_id].items.push(b);
    } else { orgBudgets.push(b); }
  }
  for (const [,g] of Object.entries(byProd)) {
    budgetOpts+=`<optgroup label="${g.name}">`;
    g.items.forEach(b=>{ budgetOpts+=`<option value="${b.id}">${b.name} (${fmtMoney(b.total_amount-b.spent)} left)</option>`; });
    budgetOpts+='</optgroup>';
  }
  if (orgBudgets.length>0){
    budgetOpts+=`<optgroup label="Org-level">`;
    orgBudgets.forEach(b=>{ budgetOpts+=`<option value="${b.id}">${b.name} (${fmtMoney(b.total_amount-b.spent)} left)</option>`; });
    budgetOpts+='</optgroup>';
  }
  const prodOpts=(pageData.productions||[]).map(p=>`<option value="${p.id}">${p.name} — ${p.season}</option>`).join('');
  const reimbOpts=REIMB_METHODS.map(m=>`<option value="${m}">${m}</option>`).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="user-greeting">
      <div class="user-av">${u.name.charAt(0).toUpperCase()}</div>
      <div><div class="user-name">${u.name}</div><div class="user-sub">Submit a new purchase request</div></div>
    </div>
    ${!trained?`<div class="training-warn">⚠️ Training not yet complete. You can still submit but an admin may need to approve access.</div>`:''}
    <div class="card"><div class="card-label">Request type</div><div class="card-body" style="padding-top:8px">
      <div class="type-toggle">
        <div class="type-opt active-pre" id="ntype-pre" onclick="setNewType('pre_approval')">
          <div class="type-opt-title">Pre-approval</div><div class="type-opt-sub">Submit before buying</div></div>
        <div class="type-opt" id="ntype-sap" onclick="setNewType('sap')">
          <div class="type-opt-title">SAP</div><div class="type-opt-sub">Already purchased</div></div>
      </div>
    </div></div>
    <div class="card"><div class="card-label">Purchase details</div><div class="card-body">
      <div class="form-group"><label class="form-label">What are you buying? <span class="req">*</span></label>
        <input type="text" id="n-title" class="form-input" placeholder="e.g. Fabric for Act 2 costumes"></div>
      <div class="two-col">
        <div class="form-group"><label class="form-label">Estimated cost <span class="req">*</span></label>
          <input type="number" id="n-cost" class="form-input" placeholder="0.00" step="0.01" min="0" inputmode="decimal"></div>
        <div class="form-group"><label class="form-label">Budget <span class="req">*</span></label>
          <select id="n-budget" class="form-select">${budgetOpts}</select></div>
      </div>
      ${prodOpts?`<div class="form-group"><label class="form-label">Production (if applicable)</label>
        <select id="n-prod" class="form-select"><option value="">Org-level</option>${prodOpts}</select></div>`:''}
    </div></div>
    <div class="card"><div class="card-label">Purchase method</div><div class="card-body" style="padding-top:8px">
      <div class="method-toggle">
        <div class="method-opt active" id="nmethod-store" onclick="setNewMethod('in_store')"><div style="font-size:18px;margin-bottom:3px">🏪</div><div style="font-size:13px;font-weight:600">In-store</div></div>
        <div class="method-opt" id="nmethod-online" onclick="setNewMethod('online')"><div style="font-size:18px;margin-bottom:3px">🌐</div><div style="font-size:13px;font-weight:600">Online</div></div>
      </div>
      <div id="n-vendor-field" class="form-group" style="margin-top:10px">
        <label class="form-label">Store / vendor</label>
        <input type="text" id="n-vendor" class="form-input" placeholder="e.g. Joann Fabrics"></div>
      <div id="n-url-field" class="form-group" style="margin-top:10px;display:none">
        <label class="form-label">Item link <span class="req">*</span></label>
        <input type="url" id="n-item-url" class="form-input" placeholder="https://..." inputmode="url"></div>
    </div></div>
    <div id="n-sap-section" style="display:none">
      <div class="card"><div class="card-label">SAP details</div><div class="card-body">
        <div class="form-group"><label class="form-label">Why was prior approval not possible? <span class="req">*</span></label>
          <textarea id="n-sap-reason" class="form-textarea" placeholder="Explain the circumstances..."></textarea></div>
        <div class="form-group"><label class="form-label">Who authorized this purchase? <span class="req">*</span></label>
          <input type="text" id="n-authorized-by" class="form-input" placeholder="e.g. Producer Sarah approved verbally">
          <div class="form-hint">Name/role of who told you to buy this</div></div>
      </div></div>
      <div class="card"><div class="card-label">Reimbursement preference</div><div class="card-body">
        <div class="two-col">
          <div class="form-group"><label class="form-label">Method</label>
            <select id="n-reimb-method" class="form-select" onchange="updateMobileReimbHandle(this.value)">
              <option value="">My profile default</option>${reimbOpts}
            </select></div>
          <div class="form-group"><label class="form-label" id="n-reimb-label">Account info</label>
            <input type="text" id="n-reimb-handle" class="form-input" placeholder="Username or info"></div>
        </div>
      </div></div>
      <div class="card"><div class="card-label">Receipt photo</div><div class="card-body">
        <div class="upload-zone" id="n-upload-zone" onclick="document.getElementById('n-file-input').click()">
          <div class="upload-icon">📷</div><div class="upload-text">Take photo or choose file</div>
          <div class="upload-sub">JPG, PNG, or PDF</div>
        </div>
        <input type="file" id="n-file-input" accept="image/*,application/pdf" onchange="handleNewFile(this)">
        <div id="n-preview"></div>
      </div></div>
    </div>
    <div class="card"><div class="card-body">
      <div class="form-group" style="margin-bottom:0"><label class="form-label">Additional notes (optional)</label>
        <textarea id="n-desc" class="form-textarea" placeholder="Any context for approvers..."></textarea></div>
    </div></div>
    <div id="n-error" class="form-error" style="margin-bottom:10px;display:none"></div>
    <button class="btn-primary" id="n-submit-btn" onclick="submitNewRequest()">Submit Request</button>`;
}

function updateMobileReimbHandle(method) {
  const label = document.getElementById('n-reimb-label');
  if (label) label.textContent = REIMB_LABELS[method]||'Account info';
  const input = document.getElementById('n-reimb-handle');
  if (input) input.placeholder = REIMB_LABELS[method]||'';
}

function setNewType(type) {
  newType=type; const isSAP=type==='sap';
  document.getElementById('ntype-pre').className='type-opt'+(isSAP?'':' active-pre');
  document.getElementById('ntype-sap').className='type-opt'+(isSAP?' active-sap':'');
  document.getElementById('n-sap-section').style.display=isSAP?'block':'none';
}

function setNewMethod(method) {
  newMethod=method; const isOnline=method==='online';
  document.getElementById('nmethod-store').classList.toggle('active',!isOnline);
  document.getElementById('nmethod-online').classList.toggle('active',isOnline);
  document.getElementById('n-vendor-field').style.display=isOnline?'none':'block';
  document.getElementById('n-url-field').style.display=isOnline?'block':'none';
}

function handleNewFile(input) {
  const file=input.files[0]; if (!file) return; newFile=file;
  document.getElementById('n-upload-zone').classList.add('has-file');
  const preview=document.getElementById('n-preview');
  if (file.type.startsWith('image/')){
    const reader=new FileReader();
    reader.onload=e=>{preview.innerHTML=`<div class="preview-wrap"><img src="${e.target.result}"></div>`;};
    reader.readAsDataURL(file);
  } else { preview.innerHTML=`<div style="margin-top:8px;padding:9px 12px;background:var(--teal3);border-radius:var(--r-sm);font-size:13px;color:var(--teal)">✓ ${file.name}</div>`; }
}

async function submitNewRequest() {
  const title   = document.getElementById('n-title')?.value.trim()||'';
  const cost    = document.getElementById('n-cost')?.value||'';
  const budget  = document.getElementById('n-budget')?.value||'';
  const prodId  = document.getElementById('n-prod')?.value||'';
  const vendor  = newMethod==='in_store'?(document.getElementById('n-vendor')?.value.trim()||''):'';
  const rawUrl  = newMethod==='online'?(document.getElementById('n-item-url')?.value.trim()||''):'';
  const itemUrl = rawUrl&&!rawUrl.match(/^https?:\/\//)?'https://'+rawUrl:rawUrl;
  const desc    = document.getElementById('n-desc')?.value.trim()||'';
  const sapReason   = document.getElementById('n-sap-reason')?.value.trim()||'';
  const authorizedBy= document.getElementById('n-authorized-by')?.value.trim()||'';
  const reimbMethod = document.getElementById('n-reimb-method')?.value||'';
  const reimbHandle = document.getElementById('n-reimb-handle')?.value.trim()||'';
  const errEl   = document.getElementById('n-error');
  const btn     = document.getElementById('n-submit-btn');
  errEl.style.display='none';
  if (!title) { showNErr('Please describe what you\'re buying.'); return; }
  if (!cost)  { showNErr('Please enter the estimated cost.'); return; }
  if (!budget){ showNErr('Please select a budget or department.'); return; }
  if (newMethod==='online'&&!itemUrl){ showNErr('Please provide a link to the item.'); return; }
  if (newType==='sap'&&!sapReason){ showNErr('Please explain why prior approval was not possible.'); return; }
  if (newType==='sap'&&!authorizedBy){ showNErr('Please specify who authorized this purchase.'); return; }
  btn.disabled=true; btn.textContent='Submitting...';
  const fd=new FormData();
  fd.append('title',title); fd.append('estimated_cost',cost); fd.append('budget_id',budget);
  fd.append('type',newType); fd.append('purchase_method',newMethod); fd.append('vendor',vendor);
  fd.append('item_url',itemUrl); fd.append('description',desc); fd.append('sap_reason',sapReason);
  fd.append('authorized_by',authorizedBy); fd.append('reimb_method',reimbMethod);
  fd.append('reimb_handle',reimbHandle);
  if (prodId) fd.append('production_id',prodId);
  if (newType==='sap'&&newFile) fd.append('file',newFile);
  try {
    const r=await fetch(`/api/receipt/${token}/new-request`,{method:'POST',body:fd});
    const d=await r.json();
    if (!r.ok){showNErr(d.error||'Submission failed');btn.disabled=false;btn.textContent='Submit Request';return;}
    showSuccess('new');
  } catch(e){showNErr('Network error — please try again.');btn.disabled=false;btn.textContent='Submit Request';}
}
function showNErr(msg){const e=document.getElementById('n-error');e.textContent=msg;e.style.display='block';}

// ══════════════════════════════════════════════
// STATEMENTS TAB
// ══════════════════════════════════════════════
async function renderStatementsTab() {
  const mc = document.getElementById('main-content');
  mc.innerHTML = '<div class="loading"><div class="spinner"></div>Loading statements...</div>';
  try {
    const r = await fetch(`/api/receipt/${token}/statements`);
    let statements = [];
    if (r.ok) { const d = await r.json(); statements = d; }
    else {
      // Fall back — no statement proxy exists yet, show helpful message
      mc.innerHTML = `
        <div class="user-greeting">
          <div class="user-av">${pageData.user.name.charAt(0).toUpperCase()}</div>
          <div><div class="user-name">${pageData.user.name}</div><div class="user-sub">Purchase Statements</div></div>
        </div>
        <div class="card"><div class="card-body" style="text-align:center;padding:24px">
          <div style="font-size:36px;margin-bottom:12px">📋</div>
          <div class="fw-600 mb-8">Manage statements on desktop</div>
          <p style="font-size:13px;color:var(--ink3);line-height:1.6">Create and manage purchase statements from the BloomBooks desktop app. Once submitted, you can attach receipts here on mobile.</p>
        </div></div>
        <div class="card"><div class="card-label">Your open requests</div><div class="card-body" style="padding-top:8px">
          ${pageData.requests.length===0
            ? '<div class="empty-note">No open requests — submit a new one using the ➕ tab.</div>'
            : pageData.requests.map(r=>{
                const amt = r.actual_cost||r.estimated_cost;
                const statusLabel = r.status.replace('pending_','⏳ ').replace('_',' ');
                return `<div class="req-card" style="cursor:default">
                  <div class="req-card-title">${r.title}</div>
                  <div class="req-card-meta">$${parseFloat(amt).toFixed(2)} · ${statusLabel}</div>
                </div>`;
              }).join('')}
        </div></div>`;
      return;
    }

    if (statements.length === 0) {
      mc.innerHTML = `
        <div class="user-greeting">
          <div class="user-av">${pageData.user.name.charAt(0).toUpperCase()}</div>
          <div><div class="user-name">Statements</div><div class="user-sub">Group purchases together</div></div>
        </div>
        <button class="btn-primary mb-16" onclick="showMobileNewStatement()">+ New statement</button>
        <div class="empty-note">No statements yet. Create one to group multiple purchases together.</div>`;
      return;
    }

    const statusColors = {draft:'var(--amber)',submitted:'var(--teal)',approved:'var(--green)',denied:'var(--red)',needs_revision:'var(--red)'};
    const statusLabels = {draft:'Draft',submitted:'Submitted',approved:'Approved',denied:'Denied',needs_revision:'Needs revision'};

    mc.innerHTML = `
      <div class="user-greeting">
        <div class="user-av">${pageData.user.name.charAt(0).toUpperCase()}</div>
        <div><div class="user-name">Statements</div><div class="user-sub">${statements.length} statement${statements.length!==1?'s':''}</div></div>
      </div>
      <button class="btn-primary mb-16" onclick="showMobileNewStatement()">+ New statement</button>
      ${statements.map(s=>{
        const isDraft = s.status==='draft';
        const color   = statusColors[s.status]||'var(--ink3)';
        return `<div class="card mb-12">
          <div class="card-body">
            <div class="flex-between mb-8" style="display:flex;align-items:center;justify-content:space-between">
              <div class="fw-600">${s.title}</div>
              <span style="font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;background:${color}22;color:${color}">${statusLabels[s.status]||s.status}</span>
            </div>
            <div style="font-size:12px;color:var(--ink3);margin-bottom:10px">${s.items.length} item${s.items.length!==1?'s':''} · ${fmtMoney(s.total)}</div>
            ${s.items.slice(0,3).map(i=>`<div style="font-size:13px;padding:6px 0;border-top:1px solid var(--border);display:flex;justify-content:space-between">
              <span>${i.title}</span><span class="fw-600">${fmtMoney(i.estimated_cost)}</span>
            </div>`).join('')}
            ${s.items.length>3?`<div style="font-size:12px;color:var(--ink3);padding-top:6px;border-top:1px solid var(--border)">+${s.items.length-3} more items</div>`:''}
            ${isDraft?`<div class="flex" style="gap:8px;margin-top:12px">
              <button class="btn-primary" style="flex:1;padding:10px;font-size:13px" onclick="showMobileAddItem(${s.id})">+ Add item</button>
              <button class="btn-primary" style="flex:1;padding:10px;font-size:13px;background:var(--green)" onclick="submitMobileStatement(${s.id})" ${s.items.length===0?'disabled':''}>Submit →</button>
            </div>`:''}
          </div>
        </div>`;
      }).join('')}`;
  } catch(e) {
    document.getElementById('main-content').innerHTML = `<div class="error-state"><div class="big-icon">⚠️</div><p>${e.message}</p></div>`;
  }
}

function showMobileNewStatement() {
  const overlay = document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:#fff;z-index:100;padding:16px;overflow-y:auto;max-width:480px;margin:0 auto';
  overlay.innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
      <button onclick="this.closest('div[style]').remove()" style="background:none;border:none;font-size:20px;cursor:pointer">←</button>
      <h2 style="font-size:17px;font-weight:700">New statement</h2>
    </div>
    <div class="form-group"><label class="form-label">Title <span class="req">*</span></label>
      <input type="text" id="mob-st-title" class="form-input" placeholder="e.g. Spring Musical Costume Purchases"></div>
    <div class="form-group"><label class="form-label">Description (optional)</label>
      <textarea id="mob-st-desc" class="form-textarea" placeholder="What is this statement for?"></textarea></div>
    <div id="mob-st-error" class="form-error" style="display:none;margin-bottom:10px"></div>
    <button class="btn-primary" onclick="createMobileStatement(this)">Create statement</button>`;
  document.body.appendChild(overlay);
}

async function createMobileStatement(btn) {
  const title = document.getElementById('mob-st-title').value.trim();
  const desc  = document.getElementById('mob-st-desc').value.trim();
  const errEl = document.getElementById('mob-st-error');
  errEl.style.display='none';
  if (!title){errEl.textContent='Title is required';errEl.style.display='block';return;}
  btn.disabled=true;btn.textContent='Creating...';
  try {
    const r=await fetch(`/api/receipt/${token}/statements`,{method:'POST',
      headers:{'Content-Type':'application/json'},body:JSON.stringify({title,description:desc})});
    const d=await r.json();
    if (!r.ok){errEl.textContent=d.error||'Failed';errEl.style.display='block';btn.disabled=false;btn.textContent='Create statement';return;}
    document.querySelector('div[style*="position:fixed"]')?.remove();
    toast('Statement created!');
    renderStatementsTab();
  } catch(e){errEl.textContent='Network error';errEl.style.display='block';btn.disabled=false;btn.textContent='Create statement';}
}

function showMobileAddItem(sid) {
  currentStatementId = sid;
  const budgets = pageData.budgets||[];
  let budgetOpts='<option value="">Select budget...</option>';
  budgets.forEach(b=>{if(b.total_amount>0)budgetOpts+=`<option value="${b.id}">${b.name}</option>`;});
  const reimbOpts=REIMB_METHODS.map(m=>`<option value="${m}">${m}</option>`).join('');

  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:#fff;z-index:100;padding:16px;overflow-y:auto;max-width:480px;margin:0 auto';
  overlay.innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
      <button onclick="this.closest('div[style]').remove()" style="background:none;border:none;font-size:20px;cursor:pointer">←</button>
      <h2 style="font-size:17px;font-weight:700">Add item to statement</h2>
    </div>
    <div class="type-toggle" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
      <div class="type-opt active-pre" id="sit-pre" onclick="setSItemType('pre_approval')"><div class="type-opt-title">Pre-approval</div></div>
      <div class="type-opt" id="sit-sap" onclick="setSItemType('sap')"><div class="type-opt-title">SAP</div></div>
    </div>
    <div class="form-group"><label class="form-label">Description <span class="req">*</span></label>
      <input type="text" id="sit-title" class="form-input" placeholder="What did you buy?"></div>
    <div class="two-col" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group"><label class="form-label">Amount <span class="req">*</span></label>
        <input type="number" id="sit-cost" class="form-input" placeholder="0.00" step="0.01"></div>
      <div class="form-group"><label class="form-label">Budget <span class="req">*</span></label>
        <select id="sit-budget" class="form-select">${budgetOpts}</select></div>
    </div>
    <div class="form-group"><label class="form-label">Vendor</label>
      <input type="text" id="sit-vendor" class="form-input" placeholder="Store or website"></div>
    <div id="sit-sap-fields" style="display:none">
      <div class="form-group"><label class="form-label">Why was prior approval not possible? <span class="req">*</span></label>
        <textarea id="sit-sap-reason" class="form-textarea"></textarea></div>
      <div class="form-group"><label class="form-label">Who authorized this? <span class="req">*</span></label>
        <input type="text" id="sit-auth" class="form-input" placeholder="e.g. Producer Sarah approved"></div>
      <div class="two-col" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group"><label class="form-label">Reimb method</label>
          <select id="sit-reimb-method" class="form-select"><option value="">Default</option>${reimbOpts}</select></div>
        <div class="form-group"><label class="form-label">Account info</label>
          <input type="text" id="sit-reimb-handle" class="form-input" placeholder="Username"></div>
      </div>
      <div class="form-group"><label class="form-label">Receipt photo</label>
        <div class="upload-zone" id="sit-upload-zone" onclick="document.getElementById('sit-receipt-file').click()">
          <div class="upload-icon" style="font-size:24px;margin-bottom:4px">📷</div>
          <div class="upload-text" style="font-size:13px">Tap to attach receipt</div>
        </div>
        <input type="file" id="sit-receipt-file" accept="image/*,application/pdf" style="display:none"
          onchange="document.getElementById('sit-upload-zone').classList.toggle('has-file',!!this.files[0]);document.getElementById('sit-file-name').textContent=this.files[0]?.name||''">
        <div id="sit-file-name" style="font-size:12px;color:var(--teal);margin-top:5px"></div>
      </div>
    </div>
    <div id="sit-error" class="form-error" style="display:none;margin-bottom:10px"></div>
    <button class="btn-primary" onclick="addMobileStatementItem(${sid},this)">Add item</button>`;
  document.body.appendChild(overlay);
}

function setSItemType(type) {
  statementItemType=type; const isSAP=type==='sap';
  document.getElementById('sit-pre').className='type-opt'+(isSAP?'':' active-pre');
  document.getElementById('sit-sap').className='type-opt'+(isSAP?' active-sap':'');
  document.getElementById('sit-sap-fields').style.display=isSAP?'block':'none';
}

async function addMobileStatementItem(sid, btn) {
  const title    = document.getElementById('sit-title').value.trim();
  const cost     = document.getElementById('sit-cost').value;
  const budget   = document.getElementById('sit-budget').value;
  const vendor   = document.getElementById('sit-vendor').value.trim();
  const sapReason= document.getElementById('sit-sap-reason')?.value.trim()||'';
  const auth     = document.getElementById('sit-auth')?.value.trim()||'';
  const reimbM   = document.getElementById('sit-reimb-method')?.value||'';
  const reimbH   = document.getElementById('sit-reimb-handle')?.value.trim()||'';
  const errEl    = document.getElementById('sit-error');
  errEl.style.display='none';
  if (!title){errEl.textContent='Description is required';errEl.style.display='block';return;}
  if (!cost){errEl.textContent='Amount is required';errEl.style.display='block';return;}
  if (!budget){errEl.textContent='Please select a budget';errEl.style.display='block';return;}
  if (statementItemType==='sap'&&!sapReason){errEl.textContent='Please explain why prior approval was not possible';errEl.style.display='block';return;}
  if (statementItemType==='sap'&&!auth){errEl.textContent='Please specify who authorized this purchase';errEl.style.display='block';return;}
  btn.disabled=true;btn.textContent='Adding...';
  try {
    const fd=new FormData();
    fd.append('type',statementItemType);fd.append('title',title);
    fd.append('estimated_cost',cost);fd.append('budget_id',budget);
    fd.append('vendor',vendor);fd.append('sap_reason',sapReason);
    fd.append('authorized_by',auth);fd.append('reimb_method',reimbM);fd.append('reimb_handle',reimbH);
    const sitFile=document.getElementById('sit-receipt-file')?.files[0];
    if(statementItemType==='sap'&&sitFile)fd.append('file',sitFile);
    const r=await fetch(`/api/receipt/${token}/statements/${sid}/items`,{method:'POST',body:fd});
    const d=await r.json();
    if (!r.ok){errEl.textContent=d.error||'Failed';errEl.style.display='block';btn.disabled=false;btn.textContent='Add item';return;}
    document.querySelector('div[style*="position:fixed"]')?.remove();
    toast('Item added!');
    renderStatementsTab();
  } catch(e){errEl.textContent='Network error';errEl.style.display='block';btn.disabled=false;btn.textContent='Add item';}
}

async function submitMobileStatement(sid) {
  try {
    const r=await fetch(`/api/receipt/${token}/statements/${sid}/submit`,{method:'POST'});
    const d=await r.json();
    if (!r.ok){alert(d.error||'Submission failed');return;}
    toast('Statement submitted!');
    renderStatementsTab();
  } catch(e){alert('Network error — please try again.');}
}

function toast(msg) {
  const t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--teal);color:#fff;padding:10px 20px;border-radius:99px;font-size:14px;font-weight:600;z-index:200;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2)';
  t.textContent=msg; document.body.appendChild(t);
  setTimeout(()=>t.remove(),2800);
}

// ══════════════════════════════════════════════
// SHARED
// ══════════════════════════════════════════════
function fmtMoney(n){return '$'+(parseFloat(n)||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');}

function showLoading() {
  document.getElementById('main-content').innerHTML='<div class="loading"><div class="spinner"></div>Loading...</div>';
}

function showError(msg) {
  document.getElementById('tab-bar').style.display='none';
  document.getElementById('main-content').innerHTML=`
    <div class="error-state"><div class="big-icon">🚫</div>
    <h3 style="font-size:18px;font-weight:700;margin-bottom:8px">Link not found</h3>
    <p style="font-size:14px;color:var(--ink3)">${msg}</p>
    <p style="font-size:13px;color:var(--ink3);margin-top:10px">Contact your production manager for a new link.</p>
    </div>`;
}

function showSuccess(type) {
  const msgs={
    receipt:{icon:'✅',title:'Receipt submitted!',body:'Your receipt has been attached. The team will review it and process your reimbursement once approved.'},
    new:{icon:'🎉',title:'Request submitted!',body:"Your purchase request is now in the approval queue. You'll get an update by email."},
  };
  const m=msgs[type];
  document.getElementById('main-content').innerHTML=`
    <div class="success-state">
      <div class="big-icon">${m.icon}</div><h2>${m.title}</h2><p>${m.body}</p>
      <button class="btn-another" onclick="location.reload()">Back to BloomBooks Mobile</button>
    </div>`;
  document.getElementById('tab-bar').style.display='none';
}

init();

</script>
