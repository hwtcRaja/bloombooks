async function renderTraining() {
  try {
    const status = await api('GET', '/training/status');
    quizAnswers = {};
    quizSubmitted = false;

    if (status.completed) {
      document.getElementById('content').innerHTML = `
        <div class="panel" style="max-width:580px;text-align:center;padding:48px 40px">
          <div style="font-size:52px;margin-bottom:16px">🎓</div>
          <h2 style="font-size:24px;font-weight:700;margin-bottom:8px;color:var(--green)">Training complete!</h2>
          <p class="text-muted text-sm">You passed with a score of <strong>${status.score}%</strong>. You are authorized to submit purchase requests for Horizon West Theater Company.</p>
          <div style="margin-top:24px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
            <button class="btn btn-primary" onclick="nav('new-request')">Submit a purchase request →</button>
            <button class="btn btn-outline" onclick="startTrainingReview()">Review training again</button>
          </div>
        </div>`;
      return;
    }

    currentSlide = 0;
    renderSlideView();
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="empty"><p>${e.message}</p></div>`;
  }
}

function startTrainingReview() {
  currentSlide = 0;
  quizAnswers = {};
  quizSubmitted = false;
  renderSlideView();
}

function renderSlideView() {
  const slide = HWTC_SLIDES[currentSlide];
  const isLast = currentSlide === HWTC_SLIDES.length - 1;
  const progress = Math.round(((currentSlide + 1) / HWTC_SLIDES.length) * 100);

  // Build section progress pills
  const sections = [...new Set(HWTC_SLIDES.map(s => s.section))];
  const currentSection = slide.section;

  document.getElementById('content').innerHTML = `
    <div style="max-width:700px">
      <!-- Progress bar -->
      <div style="margin-bottom:20px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span class="text-xs text-muted">Slide ${currentSlide + 1} of ${HWTC_SLIDES.length}</span>
          <span class="text-xs text-muted">${progress}% complete</span>
        </div>
        <div style="background:var(--cream3);border-radius:99px;height:6px">
          <div style="height:6px;border-radius:99px;background:var(--teal);width:${progress}%;transition:width .4s ease"></div>
        </div>
        <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">
          ${sections.map(s => `<span style="font-size:10px;font-weight:600;padding:3px 10px;border-radius:99px;background:${s===currentSection?'var(--teal)':'var(--cream3)'};color:${s===currentSection?'#fff':'var(--ink3)'}">${s}</span>`).join('')}
        </div>
      </div>

      <!-- Slide card -->
      <div class="card mb-16" style="border-top:4px solid ${slide.color};overflow:visible">
        <div class="card-body" style="padding:28px 32px">
          <div style="font-size:40px;margin-bottom:12px">${slide.icon}</div>
          <h2 style="font-size:22px;font-weight:700;color:var(--ink);margin-bottom:6px;letter-spacing:-.3px">${slide.title}</h2>
          <p style="font-size:14px;color:var(--ink3);margin-bottom:${slide.points.length?'24px':'0'}">${slide.subtitle}</p>
          ${slide.points.length > 0 ? `
            <ul style="list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:12px">
              ${slide.points.map(p => `
                <li style="display:flex;gap:12px;align-items:flex-start">
                  <span style="width:20px;height:20px;border-radius:50%;background:${slide.color}22;color:${slide.color};font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px">✓</span>
                  <span style="font-size:14px;line-height:1.6;color:var(--ink2)">${p}</span>
                </li>`).join('')}
            </ul>` : ''}
        </div>
      </div>

      <!-- Navigation -->
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
        <button class="btn btn-outline" onclick="prevSlide()" ${currentSlide===0?'disabled':''}>← Previous</button>
        <div style="display:flex;gap:5px;flex-wrap:wrap;justify-content:center">
          ${HWTC_SLIDES.map((_,i) => `<button onclick="goSlide(${i})" style="width:8px;height:8px;border-radius:50%;border:none;cursor:pointer;background:${i===currentSlide?'var(--teal)':'var(--cream3)'};padding:0;transition:background .2s"></button>`).join('')}
        </div>
        ${isLast
          ? `<button class="btn btn-primary" onclick="renderQuizView()">Take the quiz →</button>`
          : `<button class="btn btn-primary" onclick="nextSlide()">Next →</button>`}
      </div>
    </div>`;
}

function prevSlide() { if (currentSlide > 0) { currentSlide--; renderSlideView(); } }
function nextSlide() { currentSlide++; renderSlideView(); }
function goSlide(i)  { currentSlide = i; renderSlideView(); }

function renderQuizView() {
  quizAnswers = {};
  quizSubmitted = false;
  document.getElementById('content').innerHTML = `
    <div style="max-width:700px">
      <div class="panel mb-20" style="background:var(--teal3);border-color:var(--teal);display:flex;align-items:center;gap:16px">
        <div style="font-size:28px">📝</div>
        <div>
          <div class="fw-600" style="font-size:16px">HWTC Purchasing Knowledge Check</div>
          <div class="text-sm text-muted mt-4">${HWTC_QUESTIONS.length} questions · You need 80% to pass · Take your time</div>
        </div>
      </div>
      ${HWTC_QUESTIONS.map((q, qi) => `
        <div class="quiz-card mb-12" id="quiz-card-${qi}" style="border:1px solid var(--border);border-radius:var(--r);padding:20px">
          <div style="font-size:11px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px">Question ${qi+1} of ${HWTC_QUESTIONS.length}</div>
          <div class="quiz-q" style="font-size:15px;font-weight:600;margin-bottom:14px;color:var(--ink)">${q.question}</div>
          ${q.options.map((opt, oi) => `
            <div class="quiz-option" id="qo-${qi}-${oi}" onclick="selectAnswer(${qi},${oi})" style="display:flex;align-items:flex-start;gap:12px;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);margin-bottom:8px;cursor:pointer;transition:all .15s;font-size:14px">
              <span style="width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:1px;font-weight:700" id="qr-${qi}-${oi}"></span>
              <span>${opt}</span>
            </div>`).join('')}
          <div id="quiz-exp-${qi}" class="quiz-explanation hidden" style="font-size:13px;color:var(--ink2);margin-top:10px;padding:10px 12px;background:var(--cream2);border-radius:var(--r-sm);border-left:3px solid var(--teal)"></div>
        </div>`).join('')}
      <div id="quiz-result"></div>
      <button class="btn btn-primary btn-lg w-full mt-8" id="quiz-submit" onclick="submitQuiz()" disabled style="margin-top:8px">Submit answers</button>
      <button class="btn btn-outline w-full mt-8" onclick="renderSlideView();currentSlide=0" style="margin-top:8px">← Review slides again</button>
    </div>`;
}

function selectAnswer(qi, oi) {
  if (quizSubmitted) return;
  quizAnswers[qi] = oi;
  HWTC_QUESTIONS[qi].options.forEach((_, i) => {
    const el = document.getElementById(`qo-${qi}-${i}`);
    const radio = document.getElementById(`qr-${qi}-${i}`);
    if (i === oi) {
      el.style.borderColor = 'var(--teal)';
      el.style.background = 'var(--teal3)';
      radio.textContent = '●';
      radio.style.borderColor = 'var(--teal)';
      radio.style.color = 'var(--teal)';
    } else {
      el.style.borderColor = 'var(--border)';
      el.style.background = '';
      radio.textContent = '';
      radio.style.borderColor = 'var(--border2)';
    }
  });
  const allAnswered = HWTC_QUESTIONS.every((_,i) => quizAnswers[i] !== undefined);
  document.getElementById('quiz-submit').disabled = !allAnswered;
  if (allAnswered) {
    document.getElementById('quiz-submit').scrollIntoView({behavior:'smooth', block:'nearest'});
  }
}

async function submitQuiz() {
  quizSubmitted = true;
  let correct = 0;
  HWTC_QUESTIONS.forEach((q, qi) => {
    const selected = quizAnswers[qi];
    const isCorrect = selected === q.correct;
    if (isCorrect) correct++;
    q.options.forEach((_, oi) => {
      const el = document.getElementById(`qo-${qi}-${oi}`);
      const radio = document.getElementById(`qr-${qi}-${oi}`);
      el.style.cursor = 'default';
      if (oi === q.correct) {
        el.style.borderColor = 'var(--green)';
        el.style.background = 'var(--green-bg)';
        radio.textContent = '✓';
        radio.style.borderColor = 'var(--green)';
        radio.style.color = 'var(--green)';
      } else if (oi === selected && !isCorrect) {
        el.style.borderColor = 'var(--red)';
        el.style.background = 'var(--red-bg)';
        radio.textContent = '✕';
        radio.style.borderColor = 'var(--red)';
        radio.style.color = 'var(--red)';
      }
    });
    const expEl = document.getElementById(`quiz-exp-${qi}`);
    expEl.textContent = q.explanation;
    expEl.classList.remove('hidden');
  });

  const score = Math.round((correct / HWTC_QUESTIONS.length) * 100);
  document.getElementById('quiz-submit').style.display = 'none';
  document.querySelector('button[onclick="renderSlideView();currentSlide=0"]').style.display = 'none';

  try {
    const d = await api('POST', '/training/complete', {score});
    const passed = d.passed;
    const resultEl = document.getElementById('quiz-result');
    resultEl.innerHTML = passed
      ? `<div class="panel mt-20" style="background:var(--green-bg);border-color:#a8d8b9;text-align:center;padding:32px;border-radius:var(--r)">
           <div style="font-size:48px;margin-bottom:12px">🎓</div>
           <div style="font-size:22px;font-weight:700;color:var(--green);margin-bottom:6px">You passed!</div>
           <div class="text-sm text-muted">${correct} of ${HWTC_QUESTIONS.length} correct · ${score}%</div>
           <p class="text-sm mt-12" style="color:var(--ink2)">You are now authorized to submit purchase requests for Horizon West Theater Company.</p>
           <button class="btn btn-primary mt-16" onclick="nav('new-request')">Submit your first purchase request →</button>
         </div>`
      : `<div class="panel mt-20" style="background:var(--red-bg);border-color:#e8b4b4;text-align:center;padding:32px;border-radius:var(--r)">
           <div style="font-size:48px;margin-bottom:12px">📖</div>
           <div style="font-size:22px;font-weight:700;color:var(--red);margin-bottom:6px">Not quite — ${score}%</div>
           <div class="text-sm text-muted">${correct} of ${HWTC_QUESTIONS.length} correct · Need 80% to pass</div>
           <p class="text-sm mt-12" style="color:var(--ink2)">Review the explanations above, then try again. You've got this!</p>
           <button class="btn btn-outline mt-16" onclick="renderTraining()">Try again from the start</button>
         </div>`;

    resultEl.scrollIntoView({behavior:'smooth', block:'start'});
    if (passed) {
      currentUser.training_complete = 1;
      document.getElementById('sb-training-badge').style.display = 'none';
    }
  } catch(e) { toast(e.message, 'error'); }
}

// ── Training Admin ─────────────────────────────────────────────────────────────
async function renderTrainingAdmin() {
  try {
    const d = await api('GET', '/training');
    const m = d.module || {title:'', description:'', questions:[], pass_mark:80, slides:[]};

    document.getElementById('content').innerHTML = `
      <div style="max-width:680px">
        <div class="card mb-20">
          <div class="card-header"><span class="card-title">Training module settings</span></div>
          <div class="card-body">
            <div class="form-group"><label class="form-label">Title</label><input id="tm-title" class="form-input" value="${m.title}"></div>
            <div class="form-group"><label class="form-label">Description</label><textarea id="tm-desc" class="form-textarea">${m.description||''}</textarea></div>
            <div class="form-group"><label class="form-label">Pass mark (%)</label><input type="number" id="tm-pass" class="form-input" value="${m.pass_mark}" style="width:120px" min="1" max="100"></div>
          </div>
        </div>

        <div class="card mb-20">
          <div class="card-header">
            <span class="card-title">Slides</span>
            <button class="btn btn-outline btn-sm" onclick="document.getElementById('slide-upload-input').click()">+ Upload slide</button>
            <input type="file" id="slide-upload-input" accept="image/*" class="hidden" onchange="uploadSlide(this)">
          </div>
          <div class="card-body">
            <p class="text-sm text-muted mb-12">Upload each slide as an image (PNG/JPG). Export your PowerPoint as images: File → Export → PNG.</p>
            <div id="slides-list">
              ${m.slides && m.slides.length > 0
                ? m.slides.map((s,i) => `<div class="flex flex-center gap-8 mb-8 p-8" style="border:1px solid var(--border);border-radius:var(--r-sm)">
                    <img src="${s}" style="width:80px;height:52px;object-fit:cover;border-radius:4px">
                    <span class="text-sm">Slide ${i+1}</span>
                    <button class="btn btn-danger btn-sm" style="margin-left:auto" onclick="removeSlide(${i})">Remove</button>
                  </div>`).join('')
                : '<p class="text-sm text-muted">No slides uploaded yet.</p>'}
            </div>
          </div>
        </div>

        <div class="card mb-20">
          <div class="card-header">
            <span class="card-title">Quiz questions</span>
            <button class="btn btn-outline btn-sm" onclick="addQuestion()">+ Add question</button>
          </div>
          <div class="card-body">
            <div id="questions-list">
              ${m.questions.map((q,qi) => buildQuestionEditor(q,qi)).join('')}
            </div>
          </div>
        </div>

        <button class="btn btn-primary btn-lg" onclick="saveTraining()">Save training module</button>
      </div>`;

    window._trainingSlides = m.slides ? [...m.slides] : [];
    window._trainingQuestions = m.questions ? JSON.parse(JSON.stringify(m.questions)) : [];
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="empty"><p>${e.message}</p></div>`;
  }
}

function buildQuestionEditor(q, qi) {
  return `<div class="quiz-card" id="qedit-${qi}">
    <div class="flex flex-center gap-8 mb-8">
      <span class="fw-600 text-sm">Question ${qi+1}</span>
      <button class="btn btn-danger btn-sm" style="margin-left:auto" onclick="removeQuestion(${qi})">Remove</button>
    </div>
    <div class="form-group"><input class="form-input" placeholder="Question text" value="${q.question||''}" oninput="window._trainingQuestions[${qi}].question=this.value"></div>
    ${(q.options||['','','','']).map((opt,oi) => `
      <div class="flex flex-center gap-8 mb-8">
        <input type="radio" name="correct-${qi}" ${q.correct===oi?'checked':''} onchange="window._trainingQuestions[${qi}].correct=${oi}">
        <input class="form-input" placeholder="Option ${oi+1}" value="${opt}" oninput="window._trainingQuestions[${qi}].options[${oi}]=this.value">
      </div>`).join('')}
    <div class="form-group mt-8"><input class="form-input" placeholder="Explanation (shown after answering)" value="${q.explanation||''}" oninput="window._trainingQuestions[${qi}].explanation=this.value"></div>
  </div>`;
}

function addQuestion() {
  const q = {question:'', options:['','','',''], correct:0, explanation:''};
  window._trainingQuestions.push(q);
  const qi = window._trainingQuestions.length - 1;
  const list = document.getElementById('questions-list');
  const div = document.createElement('div');
  div.innerHTML = buildQuestionEditor(q, qi);
  list.appendChild(div.firstElementChild);
}

function removeQuestion(qi) {
  window._trainingQuestions.splice(qi, 1);
  renderTrainingAdmin();
}

async function uploadSlide(input) {
  const file = input.files[0];
  if (!file) return;
  const fd = new FormData();
  fd.append('file', file);
  try {
    const d = await api('POST', '/training/slides', fd, true);
    window._trainingSlides.push(d.url);
    await api('POST', '/training/slides/update', {slides: window._trainingSlides});
    toast('Slide uploaded!', 'success');
    renderTrainingAdmin();
  } catch(e) { toast(e.message, 'error'); }
}

async function removeSlide(idx) {
  window._trainingSlides.splice(idx, 1);
  await api('POST', '/training/slides/update', {slides: window._trainingSlides});
  toast('Slide removed.', 'info');
  renderTrainingAdmin();
}

async function saveTraining() {
  const data = {
    title: document.getElementById('tm-title').value.trim(),
    description: document.getElementById('tm-desc').value.trim(),
    pass_mark: parseInt(document.getElementById('tm-pass').value)||80,
    questions: window._trainingQuestions
  };
  try {
    await api('PUT', '/training', data);
    toast('Training module saved!', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

// ── Modal helpers ─────────────────────────────────────────────────────────────
function showModal(html, size='') {
  let bd = document.getElementById('modal-bd');
  if (!bd) {
    bd = document.createElement('div');
    bd.id = 'modal-bd';
    bd.className = 'modal-backdrop';
    bd.onclick = (e) => { if (e.target === bd) closeModal(); };
    document.body.appendChild(bd);
  }
  bd.innerHTML = `<div class="modal" style="${size==='large'?'max-width:620px':''}">${html}</div>`;
  bd.classList.remove('hidden');
}

function closeModal() {
  const bd = document.getElementById('modal-bd');
  if (bd) bd.classList.add('hidden');
}

function openLightbox(url) {
  if (!url) return;
  // If PDF, open in new tab instead
  if (url.toLowerCase().includes('.pdf') || url.toLowerCase().includes('/raw/')) {
    window.open(url, '_blank'); return;
  }
  document.getElementById('lightbox-img').src = url;
  document.getElementById('lightbox').classList.remove('hidden');
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function toast(msg, type='info') {
  const wrap = document.getElementById('toast-wrap');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const icons = {success:'✓', error:'!', info:'i'};
  t.innerHTML = `<span style="width:18px;height:18px;border-radius:50%;background:currentColor;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${icons[type]||'i'}</span>${msg}`;
  wrap.appendChild(t);
  setTimeout(() => t.remove(), 3800);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
