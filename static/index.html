<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BloomBooks — Horizon West Theater Company</title>
<style>
/* ── Reset & base ───────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#faf8f3;--cream2:#f2efe6;--cream3:#e8e4d8;
  --teal:#0f6e56;--teal2:#1a8a6c;--teal3:#e1f5ee;
  --ink:#1e1e1b;--ink2:#4a4a45;--ink3:#888880;
  --amber:#c97c10;--amber-bg:#fef3e2;
  --red:#b53030;--red-bg:#fdf0f0;
  --green:#2d7d4f;--green-bg:#edf7f2;
  --border:#dddad0;--border2:#c8c4b8;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.04);
  --shadow-lg:0 4px 16px rgba(0,0,0,.12);
  --r:10px;--r-sm:6px;--r-lg:14px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--cream);color:var(--ink);font-size:15px;line-height:1.6;min-height:100vh}
button{cursor:pointer;font-family:inherit;font-size:14px}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:var(--teal);text-decoration:none}
img{max-width:100%}

/* ── Layout ─────────────────────────────────────────────────────────── */
#app{display:flex;min-height:100vh}
#sidebar{width:240px;min-height:100vh;background:var(--ink);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto}
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#topbar{height:56px;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;flex-shrink:0;position:sticky;top:0;z-index:50}
#content{flex:1;padding:28px 28px;overflow-y:auto}

/* ── Sidebar ─────────────────────────────────────────────────────────── */
.sb-brand{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-org{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sb-org-dot{width:32px;height:32px;border-radius:8px;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.sb-org-name{font-size:11px;color:rgba(255,255,255,.5);line-height:1.3;letter-spacing:.2px}
.sb-app-name{font-size:18px;font-weight:700;color:#fff;letter-spacing:-.3px}
.sb-app-sub{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:.3px;text-transform:uppercase;margin-top:2px}

.sb-nav{flex:1;padding:12px 0}
.sb-section{padding:0 12px;margin-bottom:4px}
.sb-section-label{font-size:10px;font-weight:600;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.8px;padding:8px 8px 4px}
.sb-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r-sm);cursor:pointer;transition:background .15s;color:rgba(255,255,255,.65);font-size:13.5px;font-weight:500;border:none;background:none;width:100%;text-align:left}
.sb-item:hover{background:rgba(255,255,255,.07);color:#fff}
.sb-item.active{background:var(--teal);color:#fff}
.sb-item .sb-icon{width:18px;height:18px;flex-shrink:0;opacity:.8}
.sb-item.active .sb-icon{opacity:1}
.sb-badge{margin-left:auto;background:var(--amber);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px;min-width:18px;text-align:center}
.sb-badge.red{background:var(--red)}

.sb-footer{padding:12px;border-top:1px solid rgba(255,255,255,.08)}
.sb-user{display:flex;align-items:center;gap:10px;padding:8px;border-radius:var(--r-sm)}
.sb-user-av{width:30px;height:30px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.sb-user-name{font-size:13px;font-weight:500;color:#fff}
.sb-user-role{font-size:11px;color:rgba(255,255,255,.4);text-transform:capitalize}
.sb-logout{margin-left:auto;background:none;border:none;color:rgba(255,255,255,.35);cursor:pointer;font-size:12px;padding:4px;border-radius:4px}
.sb-logout:hover{color:rgba(255,255,255,.7)}

/* ── Topbar ─────────────────────────────────────────────────────────── */
.tb-title{font-size:16px;font-weight:600;color:var(--ink);flex:1}
.tb-breadcrumb{font-size:12px;color:var(--ink3)}
.tb-actions{display:flex;gap:8px}

/* ── Buttons ─────────────────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r-sm);font-weight:500;font-size:13.5px;border:1px solid transparent;transition:all .15s;line-height:1.4;white-space:nowrap}
.btn-primary{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn-primary:hover{background:var(--teal2)}
.btn-outline{background:#fff;color:var(--ink2);border-color:var(--border2)}
.btn-outline:hover{background:var(--cream2);border-color:var(--border2)}
.btn-danger{background:var(--red-bg);color:var(--red);border-color:#e8b4b4}
.btn-danger:hover{background:#fbe0e0}
.btn-approve{background:var(--green-bg);color:var(--green);border-color:#a8d8b9}
.btn-approve:hover{background:#d8f0e5}
.btn-sm{padding:5px 10px;font-size:12.5px}
.btn-lg{padding:10px 20px;font-size:15px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ── Cards & panels ─────────────────────────────────────────────────── */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:15px;font-weight:600;color:var(--ink)}
.card-body{padding:20px}
.panel{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--shadow)}

/* ── Stat cards ─────────────────────────────────────────────────────── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px 20px;box-shadow:var(--shadow)}
.stat-label{font-size:12px;color:var(--ink3);font-weight:500;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.stat-value{font-size:26px;font-weight:700;color:var(--ink);line-height:1.1}
.stat-sub{font-size:12px;color:var(--ink3);margin-top:2px}
.stat-card.amber .stat-value{color:var(--amber)}
.stat-card.teal .stat-value{color:var(--teal)}
.stat-card.red .stat-value{color:var(--red)}
.stat-card.green .stat-value{color:var(--green)}

/* ── Forms ───────────────────────────────────────────────────────────── */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--ink2);margin-bottom:6px}
.form-label .req{color:var(--red)}
.form-input,.form-select,.form-textarea{width:100%;padding:8px 12px;border:1px solid var(--border2);border-radius:var(--r-sm);font-size:14px;color:var(--ink);background:#fff;transition:border-color .15s;outline:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(15,110,86,.12)}
.form-textarea{resize:vertical;min-height:80px}
.form-hint{font-size:12px;color:var(--ink3);margin-top:4px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-error{color:var(--red);font-size:12.5px;margin-top:4px}

/* ── Badges & status ────────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:11.5px;font-weight:600}
.badge-pending{background:#fef3e2;color:#8a5a10}
.badge-treasurer{background:#e8effe;color:#3a4ea8}
.badge-president{background:#f0e8fe;color:#6a38b5}
.badge-approved{background:var(--green-bg);color:var(--green)}
.badge-denied{background:var(--red-bg);color:var(--red)}
.badge-reimbursed{background:var(--teal3);color:var(--teal)}
.badge-sap{background:#fff0e0;color:#a05c10;border:1px solid #f5cc90}
.badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ── Tables ─────────────────────────────────────────────────────────── */
.table-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;background:#fff}
th{background:var(--cream2);padding:10px 14px;text-align:left;font-size:12px;font-weight:600;color:var(--ink2);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid var(--cream3);font-size:13.5px;color:var(--ink);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--cream)}
.td-muted{color:var(--ink3)}

/* ── Modal ───────────────────────────────────────────────────────────── */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:#fff;border-radius:var(--r-lg);box-shadow:var(--shadow-lg);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:modal-in .18s ease}
@keyframes modal-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:16px;font-weight:700;color:var(--ink)}
.modal-close{background:none;border:none;font-size:20px;color:var(--ink3);cursor:pointer;padding:2px 6px;border-radius:4px}
.modal-close:hover{background:var(--cream2);color:var(--ink)}
.modal-body{padding:20px 24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* ── Training ────────────────────────────────────────────────────────── */
.slide-viewer{background:var(--ink);border-radius:var(--r);overflow:hidden;margin-bottom:20px;aspect-ratio:16/9;display:flex;align-items:center;justify-content:center;position:relative}
.slide-viewer img{width:100%;height:100%;object-fit:contain}
.slide-placeholder{text-align:center;color:rgba(255,255,255,.4)}
.slide-placeholder p{font-size:13px;margin-top:8px}
.slide-nav{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:20px}
.slide-dots{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:300px}
.slide-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);cursor:pointer;transition:background .15s;border:none}
.slide-dot.active{background:var(--teal)}

.quiz-card{border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px}
.quiz-q{font-size:15px;font-weight:600;margin-bottom:14px;color:var(--ink)}
.quiz-option{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);margin-bottom:8px;cursor:pointer;transition:all .15s;font-size:14px}
.quiz-option:hover:not(.disabled){border-color:var(--teal);background:var(--teal3)}
.quiz-option.selected{border-color:var(--teal);background:var(--teal3)}
.quiz-option.correct{border-color:var(--green);background:var(--green-bg)}
.quiz-option.wrong{border-color:var(--red);background:var(--red-bg)}
.quiz-option.disabled{cursor:default}
.quiz-explanation{font-size:13px;color:var(--ink2);margin-top:10px;padding:10px;background:var(--cream2);border-radius:var(--r-sm);border-left:3px solid var(--teal)}

/* ── Budget bar ─────────────────────────────────────────────────────── */
.budget-bar-wrap{background:var(--cream3);border-radius:99px;height:8px;overflow:hidden;margin-top:8px}
.budget-bar-fill{height:100%;border-radius:99px;background:var(--teal);transition:width .4s ease}
.budget-bar-fill.warn{background:var(--amber)}
.budget-bar-fill.danger{background:var(--red)}

/* ── Empty states ────────────────────────────────────────────────────── */
.empty{text-align:center;padding:48px 24px;color:var(--ink3)}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.5}
.empty h3{font-size:15px;font-weight:600;color:var(--ink2);margin-bottom:6px}
.empty p{font-size:13.5px}

/* ── Toast ───────────────────────────────────────────────────────────── */
#toast-wrap{position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:9999}
.toast{padding:12px 16px;border-radius:var(--r-sm);font-size:13.5px;font-weight:500;box-shadow:var(--shadow-lg);animation:toast-in .2s ease;display:flex;align-items:center;gap:8px;max-width:320px}
.toast.success{background:var(--green-bg);color:var(--green);border:1px solid #9ad4b8}
.toast.error{background:var(--red-bg);color:var(--red);border:1px solid #e8b4b4}
.toast.info{background:#fff;color:var(--ink);border:1px solid var(--border)}
@keyframes toast-in{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:none}}

/* ── Auth screen ─────────────────────────────────────────────────────── */
#auth-screen{min-height:100vh;display:flex;background:#1a1812}
.auth-hero{flex:1.2;position:relative;overflow:hidden;min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end}
.auth-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top}
.auth-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,8,4,.7) 0%,rgba(10,8,4,.1) 60%,transparent 100%)}
.auth-hero-caption{position:relative;z-index:2;padding:32px 36px;color:#fff}
.auth-hero-caption h2{font-family:Georgia,serif;font-size:28px;font-weight:700;letter-spacing:-.3px;margin-bottom:6px;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.auth-hero-caption p{font-size:13px;color:rgba(255,255,255,.6);letter-spacing:.3px}
.auth-panel{width:420px;flex-shrink:0;background:var(--cream);display:flex;flex-direction:column;justify-content:center;padding:48px 40px;overflow-y:auto}
.auth-panel-brand{margin-bottom:32px}
.auth-panel-brand .suite-badge{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid var(--border);border-radius:99px;padding:4px 12px 4px 6px;margin-bottom:16px}
.auth-panel-brand .suite-dot{width:20px;height:20px;background:var(--teal);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff}
.auth-panel-brand .suite-label{font-size:11px;font-weight:600;color:var(--ink3);letter-spacing:.3px}
.auth-panel-brand h1{font-family:Georgia,serif;font-size:30px;font-weight:700;color:var(--ink);letter-spacing:-.5px;margin-bottom:4px}
.auth-panel-brand p{font-size:13px;color:var(--ink3)}
.auth-tabs{display:flex;background:var(--cream2);border-radius:var(--r-sm);margin-bottom:28px;padding:3px;gap:3px}
.auth-tab{flex:1;padding:8px;font-size:13.5px;font-weight:500;border:none;background:none;cursor:pointer;color:var(--ink3);transition:all .15s;border-radius:5px}
.auth-tab.active{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.1)}
@media(max-width:820px){
  .auth-hero{display:none}
  .auth-panel{width:100%;min-height:100vh;padding:40px 28px}
}

/* ── Training gate banner ────────────────────────────────────────────── */
.training-gate{background:var(--amber-bg);border:1px solid #f0c97a;border-radius:var(--r);padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:14px}
.training-gate-icon{font-size:22px;flex-shrink:0}
.training-gate h3{font-size:14px;font-weight:700;color:#7a4e0a;margin-bottom:3px}
.training-gate p{font-size:13px;color:#8a5a10}

/* ── Upload area ─────────────────────────────────────────────────────── */
.upload-area{border:2px dashed var(--border2);border-radius:var(--r);padding:24px;text-align:center;cursor:pointer;transition:all .15s;background:var(--cream2)}
.upload-area:hover,.upload-area.drag{border-color:var(--teal);background:var(--teal3)}
.upload-area p{font-size:13px;color:var(--ink3);margin-top:6px}

/* ── Utilities ───────────────────────────────────────────────────────── */
.hidden{display:none!important}
.flex{display:flex}.flex-center{align-items:center}.gap-8{gap:8px}.gap-12{gap:12px}
.text-sm{font-size:13px}.text-xs{font-size:11.5px}.text-muted{color:var(--ink3)}
.text-right{text-align:right}.fw-600{font-weight:600}
.mt-4{margin-top:4px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mt-24{margin-top:24px}
.mb-8{margin-bottom:8px}.mb-16{margin-bottom:16px}.mb-20{margin-bottom:20px}.mb-24{margin-bottom:24px}
.w-full{width:100%}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.pill{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:600}
.section-title{font-size:18px;font-weight:700;color:var(--ink);letter-spacing:-.3px;margin-bottom:4px}
.section-sub{font-size:13.5px;color:var(--ink3);margin-bottom:20px}

/* ── Receipt thumbnails ─────────────────────────────────────────────── */
.receipt-grid{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.receipt-thumb{width:70px;height:70px;border-radius:var(--r-sm);overflow:hidden;border:1px solid var(--border);cursor:pointer;background:var(--cream2);display:flex;align-items:center;justify-content:center}
.receipt-thumb img{width:100%;height:100%;object-fit:cover}

/* ── Approve panel ───────────────────────────────────────────────────── */
.approve-panel{background:var(--cream2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-top:16px}
.approve-panel h4{font-size:13px;font-weight:700;color:var(--ink2);margin-bottom:12px}

/* ── Mobile hamburger ────────────────────────────────────────────────── */
#mobile-topbar{display:none;height:52px;background:var(--ink);align-items:center;padding:0 16px;gap:12px;position:sticky;top:0;z-index:60}
#mobile-topbar .app-name{font-size:16px;font-weight:700;color:#fff;letter-spacing:-.3px}
#hamburger{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px}
#sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:80;display:none}
#sidebar-overlay.open{display:block}

@media(max-width:768px){
  #mobile-topbar{display:flex}
  #sidebar{position:fixed;left:-260px;top:0;height:100vh;z-index:90;transition:left .25s ease;width:240px}
  #sidebar.open{left:0}
  #main{margin-left:0}
  #content{padding:16px}
  .form-row{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- Auth screen -->
<div id="auth-screen">
  <!-- Left: hero image -->
  <div class="auth-hero">
    <img src="/static/bloombooks-hero.png" alt="BloomBooks — Horizon West Theater Company">
    <div class="auth-hero-overlay"></div>
    <div class="auth-hero-caption">
      <h2>BloomBooks</h2>
      <p>HORIZON WEST THEATER COMPANY &nbsp;·&nbsp; SUITE 108</p>
    </div>
  </div>

  <!-- Right: sign in form -->
  <div class="auth-panel">
    <div class="auth-panel-brand">
      <div class="suite-badge">
        <div class="suite-dot">HW</div>
        <span class="suite-label">HWTC SUITE</span>
      </div>
      <h1>BloomBooks</h1>
      <p>Purchasing &amp; Reimbursements</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="showAuthTab('login')">Sign in</button>
      <button class="auth-tab" onclick="showAuthTab('register')">New account</button>
    </div>

    <!-- Login -->
    <div id="auth-login">
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" id="login-email" class="form-input" placeholder="you@example.com" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="login-password" class="form-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div id="login-error" class="form-error hidden"></div>
      <button class="btn btn-primary w-full btn-lg mt-8" onclick="doLogin()">Sign in</button>
      <div class="text-xs text-muted mt-12" style="text-align:center">
        Demo: volunteer@horizonwest.org / volunteer123
      </div>
    </div>

    <!-- Register -->
    <div id="auth-register" class="hidden">
      <div class="form-group">
        <label class="form-label">Full name</label>
        <input type="text" id="reg-name" class="form-input" placeholder="Jane Smith">
      </div>
      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" id="reg-email" class="form-input" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="reg-password" class="form-input" placeholder="Min 6 characters">
      </div>
      <div id="reg-error" class="form-error hidden"></div>
      <button class="btn btn-primary w-full btn-lg mt-8" onclick="doRegister()">Create account</button>
    </div>
  </div>
</div>

<!-- Main app -->
<div id="app" class="hidden">
  <!-- Mobile topbar -->
  <div id="mobile-topbar">
    <button id="hamburger" onclick="toggleSidebar()">☰</button>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let currentUser = null;
let currentPage = 'dashboard';
let allBudgets  = [];
let pendingCounts = {treasurer: 0, president: 0, reimb: 0};

// ── API ───────────────────────────────────────────────────────────────────────
async function api(method, path, body, isFile) {
  const opts = {method, credentials:'include'};
  if (body && !isFile && method !== 'DELETE') {
    opts.headers = {'Content-Type':'application/json'};
    opts.body = JSON.stringify(body);
  } else if (isFile) {
    opts.body = body;
  }
  const r = await fetch('/api' + path, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || 'Request failed');
  return data;
}

// ── Auth ──────────────────────────────────────────────────────────────────────
async function init() {
  try {
    const d = await api('GET', '/auth/me');
    if (d.user) {
      currentUser = d.user;
      showApp();
    }
  } catch(e) {}
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.classList.add('hidden');
  if (!email || !password) {
    errEl.textContent = 'Please enter your email and password.';
    errEl.classList.remove('hidden');
    return;
  }
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      credentials: 'include',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password})
    });
    let data;
    try { data = await r.json(); } catch(e) {
      errEl.textContent = 'Server error — please try again in a moment.';
      errEl.classList.remove('hidden');
      return;
    }
    if (!r.ok) {
      errEl.textContent = data.error || 'Invalid email or password.';
      errEl.classList.remove('hidden');
      return;
    }
    currentUser = data.user;
    showApp();
  } catch(e) {
    errEl.textContent = 'Could not reach the server. Please try again.';
    errEl.classList.remove('hidden');
  }
}

async function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  const errEl = document.getElementById('reg-error');
  errEl.classList.add('hidden');
  if (password.length < 6) {
    errEl.textContent = 'Password must be at least 6 characters';
    errEl.classList.remove('hidden');
    return;
  }
  try {
    const d = await api('POST', '/auth/register', {name, email, password});
    currentUser = d.user;
    showApp();
  } catch(e) {
    errEl.textContent = e.message;
    errEl.classList.remove('hidden');
  }
}

async function doLogout() {
  await api('POST', '/auth/logout');
  currentUser = null;
  document.getElementById('app').classList.add('hidden');
  document.getElementById('auth-screen').style.display = 'flex';
}

function showAuthTab(tab) {
  document.getElementById('auth-login').classList.toggle('hidden', tab !== 'login');
  document.getElementById('auth-register').classList.toggle('hidden', tab !== 'register');
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
}

// ── App init ──────────────────────────────────────────────────────────────────
function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('sb-av').textContent = currentUser.name.charAt(0).toUpperCase();
  document.getElementById('sb-name').textContent = currentUser.name;
  document.getElementById('sb-role').textContent = currentUser.role;
  const isAdmin = ['admin','treasurer','president'].includes(currentUser.role);
  const isProducer = currentUser.role === 'producer' || isAdmin;
  document.getElementById('sb-admin-section').style.display = isProducer ? '' : 'none';
  document.getElementById('sb-training-admin').style.display = currentUser.role === 'admin' ? '' : 'none';
  loadBudgets();
  refreshBadges();
  nav('dashboard');
}

// ── Navigation ────────────────────────────────────────────────────────────────
function nav(page) {
  currentPage = page;
  closeSidebar();
  document.querySelectorAll('.sb-item').forEach(b => b.classList.toggle('active', b.dataset.page === page));
  const titles = {
    dashboard: 'Dashboard', 'my-requests': 'My Requests', 'new-request': 'New Purchase Request',
    reimbursements: 'Reimbursements', approvals: 'Approval Queue', 'all-requests': 'All Requests',
    budgets: 'Budget Tracker', users: 'Users', training: 'Purchasing Training',
    'training-admin': 'Manage Training', productions: 'Productions'
  };
  document.getElementById('tb-title').textContent = titles[page] || page;
  document.getElementById('tb-actions').innerHTML = '';
  const content = document.getElementById('content');
  content.innerHTML = '<div class="empty"><div class="empty-icon">⏳</div><p>Loading...</p></div>';
  const pages = {
    'dashboard': renderDashboard, 'my-requests': renderMyRequests,
    'new-request': renderNewRequest, 'reimbursements': renderReimbursements,
    'approvals': renderApprovals, 'all-requests': renderAllRequests,
    'budgets': renderBudgets, 'users': renderUsers,
    'training': renderTraining, 'training-admin': renderTrainingAdmin,
    'productions': renderProductions
  };
  if (pages[page]) pages[page]();
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

// ── Badges ─────────────────────────────────────────────────────────────────
async function refreshBadges() {
  try {
    const s = await api('GET', '/stats');
    const isAdmin = ['admin','treasurer','president'].includes(currentUser.role);
    if (isAdmin) {
      const total = (s.pending_producer||0) + (s.pending_treasurer||0) + (s.pending_president||0);
      const apBadge = document.getElementById('sb-approval-badge');
      apBadge.textContent = total;
      apBadge.style.display = total > 0 ? '' : 'none';
      const reBadge = document.getElementById('sb-reimb-badge');
      reBadge.textContent = s.pending_reimburse || 0;
      reBadge.style.display = (s.pending_reimburse||0) > 0 ? '' : 'none';
    }
    if (s.is_producer && (s.pending_my_productions||0) > 0) {
      const apBadge = document.getElementById('sb-approval-badge');
      if (apBadge) { apBadge.textContent = s.pending_my_productions; apBadge.style.display = ''; }
    }
    if (!currentUser.training_complete) {
      document.getElementById('sb-training-badge').style.display = '';
    }
  } catch(e) {}
}

async function loadBudgets() {
  try {
    allBudgets = await api('GET', '/budgets');
  } catch(e) {}
}

// ── Status helpers ──────────────────────────────────────────────────────────
function statusBadge(status, isSAP) {
  const map = {
    pending_producer:  ['badge-pending', 'Awaiting producer'],
    pending_treasurer: ['badge-treasurer', 'Awaiting treasurer'],
    pending_president: ['badge-president', 'Awaiting president'],
    approved:          ['badge-approved', 'Approved'],
    denied:            ['badge-denied', 'Denied'],
    reimbursed:        ['badge-reimbursed', 'Reimbursed']
  };
  const [cls, label] = map[status] || ['badge-pending', status];
  const emerg = isSAP ? '<span class="badge badge-sap ml-4">SAP</span>' : '';
  return `<span class="badge ${cls}"><span class="badge-dot"></span>${label}</span>${emerg}`;
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}

function fmtMoney(n) {
  return '$' + (parseFloat(n)||0).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}

// ── Dashboard ──────────────────────────────────────────────────────────────
async function renderDashboard() {
  const isAdmin = ['admin','treasurer','president'].includes(currentUser.role);
  try {
    const stats = await api('GET', '/stats');
    const reqs = await api('GET', '/requests?mine=1');
    const recent = reqs.slice(0, 5);

    let statsHtml = '';
    if (isAdmin) {
      statsHtml = `
        <div class="stat-grid">
          <div class="stat-card amber"><div class="stat-label">Awaiting producer</div><div class="stat-value">${stats.pending_producer||0}</div></div>
          <div class="stat-card"><div class="stat-label">Awaiting treasurer</div><div class="stat-value">${stats.pending_treasurer||0}</div></div>
          <div class="stat-card"><div class="stat-label">Awaiting president</div><div class="stat-value">${stats.pending_president||0}</div></div>
          <div class="stat-card teal"><div class="stat-label">Pending reimbursement</div><div class="stat-value">${stats.pending_reimburse||0}</div></div>
          <div class="stat-card green"><div class="stat-label">Total approved spend</div><div class="stat-value">${fmtMoney(stats.total_spent||0)}</div></div>
          <div class="stat-card"><div class="stat-label">Self-Authorized Purchase (SAP)s</div><div class="stat-value">${stats.emergency_count||0}</div></div>
        </div>`;
    } else {
      statsHtml = `
        <div class="stat-grid">
          <div class="stat-card"><div class="stat-label">My requests</div><div class="stat-value">${stats.my_requests}</div></div>
          <div class="stat-card green"><div class="stat-label">Approved</div><div class="stat-value">${stats.my_approved}</div></div>
          <div class="stat-card amber"><div class="stat-label">Pending</div><div class="stat-value">${stats.my_pending}</div></div>
          <div class="stat-card teal"><div class="stat-label">I'm owed</div><div class="stat-value">${fmtMoney(stats.my_owed)}</div></div>
        </div>`;
    }

    const trainingGate = !currentUser.training_complete && currentUser.role === 'volunteer' ? `
      <div class="training-gate mb-24">
        <div class="training-gate-icon">📋</div>
        <div>
          <h3>Complete your purchasing training</h3>
          <p>You need to complete the HWTC purchasing training before submitting purchase requests.</p>
        </div>
        <button class="btn btn-outline btn-sm" onclick="nav('training')" style="margin-left:auto;flex-shrink:0">Start training →</button>
      </div>` : '';

    const recentHtml = recent.length === 0 ?
      `<div class="empty"><div class="empty-icon">📄</div><h3>No requests yet</h3><p>Submit your first purchase request to get started.</p></div>` :
      `<div class="table-wrap"><table>
        <thead><tr><th>Title</th><th>Amount</th><th>Budget</th><th>Submitted</th><th>Status</th></tr></thead>
        <tbody>${recent.map(r => `
          <tr style="cursor:pointer" onclick="showRequestDetail(${r.id})">
            <td><div class="fw-600">${r.title}</div><div class="text-xs text-muted">${r.vendor||''}</div></td>
            <td>${fmtMoney(r.estimated_cost)}</td>
            <td class="td-muted">${r.budget_name||'—'}</td>
            <td class="td-muted">${fmtDate(r.submitted_at)}</td>
            <td>${statusBadge(r.status, r.is_sap)}</td>
          </tr>`).join('')}
        </tbody></table></div>`;

    let budgetHtml = '';
    if (isAdmin && allBudgets.length > 0) {
      const active = allBudgets.filter(b => b.is_active).slice(0,4);
      budgetHtml = `
        <div class="card mt-24">
          <div class="card-header"><span class="card-title">Budget overview</span><button class="btn btn-outline btn-sm" onclick="nav('budgets')">View all</button></div>
          <div class="card-body">
            ${active.map(b => {
              const pct = b.total_amount > 0 ? Math.min(100, (b.spent/b.total_amount)*100) : 0;
              const cls = pct>90?'danger':pct>70?'warn':'';
              return `<div class="mb-16">
                <div class="flex flex-center gap-8 mb-4">
                  <span class="fw-600 text-sm">${b.name}</span>
                  <span class="text-xs text-muted" style="margin-left:auto">${fmtMoney(b.spent)} / ${fmtMoney(b.total_amount)}</span>
                </div>
                <div class="budget-bar-wrap"><div class="budget-bar-fill ${cls}" style="width:${pct}%"></div></div>
              </div>`;
            }).join('')}
          </div>
        </div>`;
    }

    document.getElementById('content').innerHTML = `
      ${trainingGate}
      <div class="section-title">Welcome back, ${currentUser.name.split(' ')[0]}</div>
      <div class="section-sub">${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}</div>

        </div>
        <div class="card-body" style="padding:0">${recentHtml}</div>
      </div>
      ${budgetHtml}`;
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="empty"><p>Error loading dashboard: ${e.message}</p></div>`;
  }
}

function onProductionChange(prodId) {
  populateBudgetDropdown(prodId ? parseInt(prodId) : null);
  const hint = document.getElementById('prod-approval-hint');
  if (!hint) return;
  if (prodId) {
    hint.textContent = 'Show purchases go to the producer for approval first, then treasurer, then president.';
    hint.style.color = 'var(--teal)';
  } else {
    hint.textContent = '';
  }
}

function populateBudgetDropdown(prodId) {
  const sel = document.getElementById('req-budget');
  if (!sel) return;
  let opts = '<option value="">Select a budget / department...</option>';
  if (prodId) {
    const prodBudgets = allBudgets.filter(b => b.production_id === prodId && b.is_active !== 0);
    if (prodBudgets.length === 0) {
      opts += '<option value="" disabled>No departments set up for this production yet</option>';
    } else {
      opts += prodBudgets.map(b => {
        const rem = b.total_amount - b.spent;
        return `<option value="${b.id}">${b.name} — ${b.area} (${fmtMoney(rem)} remaining)</option>`;
      }).join('');
    }
  } else {
    // Only show budgets with an actual amount (not parent categories with total_amount=0)
    const orgBudgets = allBudgets.filter(b => !b.production_id && b.total_amount > 0);
    // Group sub-budgets under their parent label
    const parentMap = {};
    const standalone = [];
    orgBudgets.forEach(b => {
      if (b.parent_id) {
        const parent = allBudgets.find(p => p.id === b.parent_id);
        const key = parent ? parent.name : 'Other';
        if (!parentMap[key]) parentMap[key] = [];
        parentMap[key].push(b);
      } else {
        standalone.push(b);
      }
    });
    // Grouped sub-budgets
    for (const [groupName, items] of Object.entries(parentMap)) {
      opts += `<optgroup label="${groupName}">`;
      items.forEach(b => {
        const rem = b.total_amount - b.spent;
        opts += `<option value="${b.id}">${b.name} (${fmtMoney(rem)} left)</option>`;
      });
      opts += '</optgroup>';
    }
    // Standalone budgets
    standalone.forEach(b => {
      const rem = b.total_amount - b.spent;
      opts += `<option value="${b.id}">${b.name} — ${b.area} (${fmtMoney(rem)} remaining)</option>`;
    });
  }
  sel.innerHTML = opts;
}

function toggleSAP(isSAP) {

function togglePurchaseMethod(method) {
  const isOnline = method === 'online';
  document.getElementById('vendor-field').classList.toggle('hidden', isOnline);
  document.getElementById('url-field').classList.toggle('hidden', !isOnline);
  document.getElementById('method-store').style.border = isOnline ? '2px solid var(--border)' : '2px solid var(--teal)';
  document.getElementById('method-store').style.background = isOnline ? '' : 'var(--teal3)';
  document.getElementById('method-online').style.border = isOnline ? '2px solid var(--teal)' : '2px solid var(--border)';
  document.getElementById('method-online').style.background = isOnline ? 'var(--teal3)' : '';

async function submitRequest() {
  const title  = document.getElementById('req-title').value.trim();
  const cost   = document.getElementById('req-cost').value;
  const budget = document.getElementById('req-budget').value;
  const desc   = document.getElementById('req-desc').value.trim();
  const isSAP  = document.querySelector('input[name="req-type"]:checked').value === 'sap';
  const sapReason = document.getElementById('req-sap-reason')?.value.trim() || '';
  const method = document.querySelector('input[name="purchase-method"]:checked')?.value || 'in_store';
  const vendor  = method === 'in_store' ? (document.getElementById('req-vendor')?.value.trim() || '') : '';
  const rawUrl  = method === 'online' ? (document.getElementById('req-item-url')?.value.trim() || '') : '';
  const itemUrl = rawUrl && !rawUrl.match(/^https?:\/\//) ? 'https://' + rawUrl : rawUrl;
  const prodEl  = document.getElementById('req-production');
  const prodId  = prodEl ? prodEl.value : null;
  const errEl   = document.getElementById('req-error');
  errEl.classList.add('hidden');

  if (!title || !cost || !budget) {
    errEl.textContent = 'Please fill in all required fields.'; errEl.classList.remove('hidden'); return;
  }
  if (isSAP && !sapReason) {
    errEl.textContent = 'Please explain why prior approval was not possible.'; errEl.classList.remove('hidden'); return;
  }
  if (method === 'online' && !itemUrl) {
    errEl.textContent = 'Please provide a link to the item for online purchases.'; errEl.classList.remove('hidden'); return;
  }
  try {
    const d = await api('POST', '/requests', {
      title, description:desc, vendor,
      estimated_cost: parseFloat(cost),
      budget_id: parseInt(budget),
      production_id: prodId ? parseInt(prodId) : null,
      is_sap: isSAP,
      sap_reason: sapReason,
      purchase_method: method,
      item_url: itemUrl
    });
    if (isSAP && newReceiptFile) {
      const fd = new FormData();
      fd.append('file', newReceiptFile);
      await api('POST', `/requests/${d.id}/receipts`, fd, true);
    }
    toast('Request submitted! You\'ll hear back by email.', 'success');
    newReceiptFile = null;
    nav('my-requests');
    refreshBadges();
  } catch(e) {
    errEl.textContent = e.message; errEl.classList.remove('hidden');
  }
}

async function showRequestDetail(rid) {
  const reqs = await api('GET', '/requests');

  if (!r) return;

  const isAdmin = ['admin','treasurer','president'].includes(currentUser.role);
  const canApprove = isAdmin && (r.status === 'pending_treasurer' || r.status === 'pending_president');
  const canApproveNow = (currentUser.role === 'treasurer' || currentUser.role === 'admin') && r.status === 'pending_treasurer'
    || (currentUser.role === 'president' || currentUser.role === 'admin') && r.status === 'pending_president';

  const receiptsHtml = r.receipts && r.receipts.length > 0 ?
    `<div class="receipt-grid">${r.receipts.map(rc => `
      <div class="receipt-thumb" onclick="openLightbox('${rc.image_url}')" title="Click to view full size">

    <div class="mt-16">

        <button class="btn btn-danger" onclick="doApprove(${r.id}, 'deny')">✕ Deny</button>
      </div>
    </div>` : '';

  const html = `
    <div class="modal-header">
      <span class="modal-title">${r.title}</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="flex gap-8 mb-16 flex-wrap">${statusBadge(r.status, r.is_sap)}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
        <div><div class="text-xs text-muted">Submitted by</div><div class="fw-600 text-sm mt-4">${r.submitter_name}</div></div>
        <div><div class="text-xs text-muted">Date</div><div class="fw-600 text-sm mt-4">${fmtDate(r.submitted_at)}</div></div>
        <div><div class="text-xs text-muted">Estimated cost</div><div class="fw-600 text-sm mt-4">${fmtMoney(r.estimated_cost)}</div></div>
        <div><div class="text-xs text-muted">Purchase method</div><div class="fw-600 text-sm mt-4">${r.purchase_method==='online'?'🌐 Online':'🏪 In-store'}${r.vendor?' — '+r.vendor:''}</div></div>
        <div><div class="text-xs text-muted">Budget</div><div class="fw-600 text-sm mt-4">${r.budget_name||'—'} (${r.budget_area||''})</div></div>
        <div><div class="text-xs text-muted">Type</div><div class="fw-600 text-sm mt-4">${r.is_sap ? 'SAP — Self-Authorized' : 'Pre-approval'}</div></div>
      </div>
      ${r.item_url ? `<div class="mb-12"><div class="text-xs text-muted mb-4">Item link</div><a href="${r.item_url}" target="_blank" rel="noopener" style="font-size:13px;color:var(--teal);word-break:break-all">${r.item_url}</a></div>` : ''}
      ${r.description ? `<div class="mb-16"><div class="text-xs text-muted mb-4">Description</div><div class="text-sm">${r.description}</div></div>` : ''}
      ${r.sap_reason ? `<div class="mb-16"><div class="text-xs text-muted mb-4">SAP reason</div><div class="text-sm" style="color:var(--amber)">${r.sap_reason}</div></div>` : ''}
      ${r.treasurer_note ? `<div class="mb-8"><div class="text-xs text-muted mb-4">Treasurer note</div><div class="text-sm">${r.treasurer_note}</div></div>` : ''}

async function confirmDeleteRequest(rid, title) {
  const html = `
    <div class="modal-header"><span class="modal-title">Delete request</span><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <p class="text-sm">Are you sure you want to permanently delete <strong>${title}</strong>?</p>
      <p class="text-sm mt-8" style="color:var(--red)">This cannot be undone. Any attached receipts will also be removed.</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="doDeleteRequest(${rid})">Delete permanently</button>
    </div>`;
  showModal(html);
}

async function doDeleteRequest(rid) {
  try {
    await api('DELETE', `/requests/${rid}`);
    toast('Request deleted.', 'info');
    closeModal();
    refreshBadges();
    // Refresh whichever page we're on
    const active = document.querySelector('.sb-item.active')?.dataset?.page;
    if (active === 'approvals') renderApprovals();
    else if (active === 'all-requests') renderAllRequests();
    else renderMyRequests();
  } catch(e) { toast(e.message, 'error'); }
}

async function uploadReceiptForRequest(rid, input) {
  const file = input.files[0];
  if (!file) return;
  const fd = new FormData();
  fd.append('file', file);
  try {
    await api('POST', `/requests/${rid}/receipts`, fd, true);
    toast('Receipt uploaded!', 'success');
    closeModal();
    refreshBadges();
  } catch(e) {
    toast(e.message, 'error');

// ── Approvals Queue ──────────────────────────────────────────────────────────
async function renderApprovals() {
  document.getElementById('tb-title').textContent = 'Request Board';
  try {
    const all = await api('GET', '/requests');

    // "In Review" = has at least one approval but not fully done yet
    const inReview = all.filter(r =>
      ['pending_treasurer','pending_president'].includes(r.status) &&
      (r.producer_acted_at || r.treasurer_acted_at)
    );
    const inReviewIds = new Set(inReview.map(r => r.id));
    const pending  = all.filter(r => ['pending_producer','pending_treasurer','pending_president'].includes(r.status) && !inReviewIds.has(r.id));
    const approved = all.filter(r => r.status === 'approved');
    const paid     = all.filter(r => r.status === 'reimbursed');
    const denied   = all.filter(r => r.status === 'denied');

    function approvalTrail(r) {
      const isShow = !!r.production_id;
      const steps = [];
      if (isShow) steps.push({ label:'Producer', done:!!r.producer_acted_at, note:r.producer_note, current:r.status==='pending_producer' });
      steps.push({ label:'Treasurer', done:!!r.treasurer_acted_at, note:r.treasurer_note, current:r.status==='pending_treasurer' });
      steps.push({ label:'President', done:!!r.president_acted_at, note:r.president_note, current:r.status==='pending_president' });
      return '<div class="flex gap-4 mt-8 flex-wrap" style="align-items:center">' +
        steps.map((s,i) => {
          const color = s.done ? 'var(--green)' : s.current ? 'var(--amber)' : 'var(--ink3)';
          const bg    = s.done ? 'var(--green-bg)' : s.current ? 'var(--amber-bg)' : 'var(--cream2)';
          const icon  = s.done ? '✓' : s.current ? '⏳' : '·';
          return (i>0?'<span style="color:var(--border);font-size:9px;margin:0 2px">→</span>':'') +
            `<span title="${s.note||''}" style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:99px;background:${bg};color:${color};cursor:${s.note?'help':'default'}">${icon} ${s.label}</span>`;
        }).join('') + '</div>';
    }

    function canActOn(r) {
      if (currentUser.role === 'admin') return ['pending_producer','pending_treasurer','pending_president'].includes(r.status);
      if (currentUser.role === 'treasurer') return r.status === 'pending_treasurer';
      if (currentUser.role === 'president') return r.status === 'pending_president';
      if (currentUser.role === 'producer') return r.status === 'pending_producer';
      return false;
    }

    function requestCard(r) {
      const bp = r.budget_total > 0 ? Math.min(100,((r.budget_spent+r.estimated_cost)/r.budget_total)*100) : 0;
      const acting = canActOn(r);
      return `<div class="card mb-8">
        <div class="card-body" style="padding:11px 13px;font-size:13px">
          <div class="flex flex-center gap-6 mb-5">
            ${r.production_name?`<span class="badge badge-treasurer" style="font-size:10px">${r.production_name}</span>`:'<span class="text-xs text-muted">Org</span>'}
            ${r.is_sap?'<span class="badge badge-sap" style="font-size:10px">SAP</span>':''}
            ${r.purchase_method==='online'?'<span style="font-size:10px">🌐</span>':'<span style="font-size:10px">🏪</span>'}
            <span class="text-xs text-muted" style="margin-left:auto">${fmtDate(r.submitted_at)}</span>
          </div>
          <div class="fw-600 mb-1" style="line-height:1.3">${r.title}</div>
          <div class="text-xs text-muted mb-5">${r.submitter_name}${r.budget_name?' · '+r.budget_name:''}</div>
          <div class="fw-600" style="font-size:15px">${fmtMoney(r.estimated_cost)}${r.actual_cost&&r.actual_cost!==r.estimated_cost?` <span class="text-xs text-muted">actual ${fmtMoney(r.actual_cost)}</span>`:''}</div>
          ${r.item_url?`<div class="mt-4"><a href="${r.item_url}" target="_blank" rel="noopener" style="font-size:11px;color:var(--teal)">🌐 View item →</a></div>`:''}
          ${r.sap_reason?`<div class="mt-5 text-xs" style="color:var(--amber);background:var(--amber-bg);padding:4px 7px;border-radius:var(--r-sm)">SAP: ${r.sap_reason}</div>`:''}
          ${r.budget_name?`<div class="mt-5"><div class="budget-bar-wrap" style="height:3px"><div class="budget-bar-fill ${bp>90?'danger':bp>70?'warn':''}" style="width:${bp}%;height:3px"></div></div><div class="text-xs text-muted mt-1">${fmtMoney(r.budget_spent)}/${fmtMoney(r.budget_total)}</div></div>`:''}
          ${r.receipts&&r.receipts.length>0?`<div class="flex gap-3 mt-5">${r.receipts.map(rc=>`<div class="receipt-thumb" style="width:36px;height:36px" onclick="openLightbox('${rc.image_url}')"><img src="${rc.image_url}" onerror="this.outerHTML='<span>📎</span>'"></div>`).join('')}</div>`:''}
          ${approvalTrail(r)}
          ${acting?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
            ${r.status==='pending_president'?`<input type="number" id="act-${r.id}" class="form-input mb-6" value="${r.actual_cost||r.estimated_cost}" step="0.01" placeholder="Actual cost" style="padding:5px 9px;font-size:12px">` :''}
            <textarea id="note-${r.id}" class="form-textarea mb-6" style="min-height:38px;font-size:12px" placeholder="Note (optional)..."></textarea>
            <div class="flex gap-6">
              <button class="btn btn-approve btn-sm" style="flex:1" onclick="quickApprove(${r.id},'approve')">✓ Approve</button>
              <button class="btn btn-danger btn-sm" style="flex:1" onclick="quickApprove(${r.id},'deny')">✕ Deny</button>
            </div>
          </div>`:`<button class="btn btn-outline btn-sm mt-6 w-full" onclick="showRequestDetail(${r.id})">View</button>`}
        </div>
      </div>`;
    }

    const colDefs = [
      { key:'pending',  label:'Pending',   color:'#c97c10', data:pending  },
      { key:'inreview', label:'In Review', color:'#185fa5', data:inReview },
      { key:'approved', label:'Approved',  color:'#2d7d4f', data:approved },
      { key:'paid',     label:'Paid',      color:'#555',    data:paid     },
    ];

    document.getElementById('content').innerHTML = `
      <div style="overflow-x:auto">
        <div style="display:grid;grid-template-columns:repeat(4,minmax(220px,1fr));gap:14px;min-width:700px">
          ${colDefs.map(col => `<div>
            <div style="display:flex;align-items:center;gap:7px;margin-bottom:10px;padding:6px 2px">
              <span style="width:8px;height:8px;border-radius:50%;background:${col.color};flex-shrink:0"></span>
              <span style="font-size:13px;font-weight:700">${col.label}</span>
              <span style="margin-left:auto;font-size:11px;font-weight:600;padding:1px 7px;border-radius:99px;background:var(--cream2);color:var(--ink3)">${col.data.length}</span>
            </div>
            <div style="min-height:60px">
              ${col.data.length===0
                ?'<div style="border:2px dashed var(--border);border-radius:var(--r);padding:16px;text-align:center;color:var(--ink3);font-size:12px">Nothing here</div>'
                :col.data.map(r=>requestCard(r)).join('')}
            </div>
          </div>`).join('')}
        </div>
      </div>
      ${denied.length>0?`<div style="margin-top:24px">
        <div class="text-xs text-muted fw-600 mb-8">DENIED (${denied.length})</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px">
          ${denied.map(r=>`<div class="card" style="opacity:.55"><div class="card-body" style="padding:10px 13px">
            <div class="fw-600 text-sm mb-1">${r.title}</div>
            <div class="text-xs text-muted">${r.submitter_name} · ${fmtMoney(r.estimated_cost)}</div>
            ${r.president_note||r.treasurer_note||r.producer_note?`<div class="text-xs mt-4" style="color:var(--red)">${r.president_note||r.treasurer_note||r.producer_note}</div>`:''}
          </div></div>`).join('')}
        </div>
      </div>`:''}`;
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="empty"><p>${e.message}</p></div>`;
  }
}
async function quickApprove(rid, action) {
  const note = document.getElementById(`note-${rid}`)?.value || '';

    refreshBadges();
    renderApprovals();
  } catch(e) {
    toast(e.message, 'error');
  }
}

// ── Budgets ───────────────────────────────────────────────────────────────────
async function renderBudgets() {
  const isAdmin = ['admin','treasurer','president'].includes(currentUser.role);
  if (isAdmin) {
    document.getElementById('tb-actions').innerHTML = `<button class="btn btn-primary btn-sm" onclick="showBudgetModal()">+ New org budget</button>`;
  }
  try {
    const budgets = await api('GET', '/budgets');

    const budgetCard = (b, canEdit) => {
      const pct = b.total_amount > 0 ? Math.min(100, (b.spent/b.total_amount)*100) : 0;
      const remaining = b.total_amount - b.spent;
      const cls = pct>90?'danger':pct>70?'warn':'';
      return `<div class="card mb-8">
        <div class="card-body" style="padding:14px 16px">
          <div class="flex flex-center mb-4">
            <div><div class="fw-600 text-sm">${b.name}</div><div class="text-xs text-muted">${b.area}</div></div>
            <div style="margin-left:auto;text-align:right">
              <div class="fw-600" style="color:${remaining<0?'var(--red)':'var(--ink)'}">${fmtMoney(remaining)}</div>
              <div class="text-xs text-muted">of ${fmtMoney(b.total_amount)}</div>
            </div>
          </div>
          <div class="budget-bar-wrap"><div class="budget-bar-fill ${cls}" style="width:${pct}%"></div></div>
          <div class="flex flex-center gap-8 mt-8">
            <span class="text-xs text-muted">Spent: ${fmtMoney(b.spent)} · ${Math.round(pct)}%</span>
            ${canEdit ? `
              <div class="flex gap-6" style="margin-left:auto">
                <button class="btn btn-outline btn-sm" style="font-size:11px;padding:3px 8px"
                  onclick="showBudgetModal(${b.id},'${b.name.replace(/'/g,"\\'")}','${b.area}','${b.season}',${b.total_amount})">Edit</button>
                ${b.is_active
                  ? `<button class="btn btn-outline btn-sm" style="font-size:11px;padding:3px 8px" onclick="archiveBudget(${b.id})">Archive</button>`
                  : `<button class="btn btn-outline btn-sm" style="font-size:11px;padding:3px 8px" onclick="restoreBudget(${b.id})">Restore</button>`}
                <button class="btn btn-danger btn-sm" style="font-size:11px;padding:3px 8px" onclick="confirmDeleteBudget(${b.id},'${b.name.replace(/'/g,"\\'")}')">Delete</button>
              </div>` : ''}
          </div>
        </div>
      </div>`;
    };

    const canEdit = ['admin','treasurer','president'].includes(currentUser.role);

    // Group by production
    const byProd = {};
    const orgBudgets = [];
    for (const b of budgets) {
      if (b.production_id) {
        if (!byProd[b.production_id]) byProd[b.production_id] = {name: b.production_name, budgets: []};
        byProd[b.production_id].budgets.push(b);
      } else {
        orgBudgets.push(b);
      }
    }

    let html = '';

    // Production budgets
    for (const [pid, group] of Object.entries(byProd)) {
      const totalBudget = group.budgets.reduce((s,b) => s+b.total_amount, 0);
      const totalSpent  = group.budgets.reduce((s,b) => s+b.spent, 0);
      const pct = totalBudget > 0 ? Math.min(100, (totalSpent/totalBudget)*100) : 0;
      html += `
        <div class="card mb-16">
          <div class="card-header">
            <div>
              <span class="card-title">${group.name}</span>
              <div class="text-xs text-muted mt-4">
                Total: ${fmtMoney(totalBudget)} · Spent: ${fmtMoney(totalSpent)} · Remaining: ${fmtMoney(totalBudget-totalSpent)}
              </div>
            </div>
            ${isAdmin ? `<button class="btn btn-outline btn-sm" onclick="showBudgetModal(0,'','','',0,${pid})">+ Add dept</button>` : ''}
          </div>
          <div class="card-body">
            <div class="budget-bar-wrap mb-16"><div class="budget-bar-fill ${pct>90?'danger':pct>70?'warn':''}" style="width:${pct}%"></div></div>
            ${group.budgets.filter(b=>b.is_active).map(b => budgetCard(b, canEdit)).join('')}
            ${group.budgets.filter(b=>!b.is_active).length > 0 ? `
              <div class="text-xs text-muted mt-8 mb-8">Archived departments</div>
              ${group.budgets.filter(b=>!b.is_active).map(b => budgetCard(b, canEdit)).join('')}` : ''}
          </div>
        </div>`;
    }

    // Org-level budgets — with parent/subcategory hierarchy
    if (orgBudgets.length > 0) {
      const topLevel = orgBudgets.filter(b => !b.parent_id && b.is_active);
      const subBudgets = orgBudgets.filter(b => b.parent_id);

      html += `<div class="fw-600 mb-12" style="font-size:15px">Org-level budgets</div>`;
      topLevel.forEach(parent => {
        const children = subBudgets.filter(c => c.parent_id === parent.id && c.is_active);
        // Parent total = sum of children (rollup), parent.total_amount is just 0/ignored
        const rollupTotal = children.reduce((s,c)=>s+c.total_amount,0);
        const rollupSpent = children.reduce((s,c)=>s+c.spent,0);
        const pp = rollupTotal>0?Math.min(100,(rollupSpent/rollupTotal)*100):0;
        const pr = rollupTotal - rollupSpent;
        html += `<div class="card mb-12"><div class="card-body" style="padding:14px 16px">
          <div class="flex flex-center mb-6">
            <div>
              <div class="fw-600">${parent.name}</div>
              <div class="text-xs text-muted">${parent.area}${children.length>0?' · '+children.length+' sub-budget'+(children.length!==1?'s':''):' · category'}</div>
            </div>
            <div style="margin-left:auto;text-align:right">
              <div class="fw-600" style="color:${pr<0?'var(--red)':'var(--ink)'}">${fmtMoney(pr)} remaining</div>
              <div class="text-xs text-muted">${fmtMoney(rollupSpent)} of ${fmtMoney(rollupTotal)} spent</div>
            </div>
          </div>
          <div class="budget-bar-wrap mb-8"><div class="budget-bar-fill ${pp>90?'danger':pp>70?'warn':''}" style="width:${pp}%"></div></div>
          ${children.map(c => {
            const cp = c.total_amount>0?Math.min(100,(c.spent/c.total_amount)*100):0;
            const cr = c.total_amount - c.spent;
            return `<div style="border-left:3px solid var(--border);padding-left:12px;margin:8px 0">
              <div class="flex flex-center mb-3">
                <div><div class="text-sm fw-600">${c.name}</div><div class="text-xs text-muted">${c.area}</div></div>
                <div style="margin-left:auto;text-align:right">
                  <div class="fw-600 text-sm" style="color:${cr<0?'var(--red)':'var(--ink)'}">${fmtMoney(cr)}</div>
                  <div class="text-xs text-muted">of ${fmtMoney(c.total_amount)}</div>
                </div>
              </div>
              <div class="budget-bar-wrap" style="height:4px"><div class="budget-bar-fill" style="width:${cp}%;height:4px"></div></div>
              ${canEdit?`<div class="flex gap-6 mt-4">
                <button class="btn btn-outline btn-sm" style="font-size:11px;padding:2px 7px" onclick="showBudgetModal(${c.id},'${c.name.replace(/'/g,"\\'")}','${c.area}','${c.season||''}',${c.total_amount},null,${c.parent_id})">Edit</button>
                <button class="btn btn-danger btn-sm" style="font-size:11px;padding:2px 7px" onclick="confirmDeleteBudget(${c.id},'${c.name.replace(/'/g,"\\'")}')">Delete</button>
              </div>`:''}
            </div>`;
          }).join('')}
          ${canEdit?`<div class="flex gap-6 mt-8">
            <button class="btn btn-outline btn-sm" style="font-size:11px;padding:3px 8px" onclick="showBudgetModal(${parent.id},'${parent.name.replace(/'/g,"\\'")}','${parent.area}','${parent.season||''}',0)">Edit</button>
            <button class="btn btn-outline btn-sm" style="font-size:11px;padding:3px 8px" onclick="showBudgetModal(0,'','','',0,null,${parent.id})">+ Sub-budget</button>
            <button class="btn btn-danger btn-sm" style="font-size:11px;padding:3px 8px" onclick="confirmDeleteBudget(${parent.id},'${parent.name.replace(/'/g,"\\'")}')">Delete</button>
          </div>`:''}
        </div></div>`;
      });
      const archived = orgBudgets.filter(b => !b.is_active);
      if (archived.length > 0) {
        html += `<div class="text-xs text-muted mt-12 mb-8">Archived</div>`;
        html += archived.map(b => budgetCard(b, canEdit)).join('');
      }
    }

    if (!html) html = `<div class="empty"><div class="empty-icon">💰</div><h3>No budgets yet</h3>${isAdmin?'<button class="btn btn-primary mt-16" onclick="showBudgetModal()">Create first budget</button>':''}</div>`;
    document.getElementById('content').innerHTML = `<div class="section-sub">Track spend across productions and org areas</div>${html}`;
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="empty"><p>${e.message}</p></div>`;
  }
}

function showBudgetModal(id=0, name='', area='', season='', total=0, production_id=null, parent_id=null) {
  const isEdit = !!id;
  const isSubBudget = !!parent_id; // Creating a sub-budget under a parent
  const parentOpts = allBudgets
    .filter(b => !b.production_id && !b.parent_id && b.is_active && b.id !== id)
    .map(b => `<option value="${b.id}" ${parent_id==b.id?'selected':''}>${b.name}</option>`)
    .join('');

  // Work out if this is a category (parent) or a budget (leaf with amount)
  // A top-level org budget with no parent_id set is treated as a category container
  // if it has sub-budgets. For new ones, user picks by whether they set a parent.

  const html = `
    <div class="modal-header">
      <span class="modal-title">${isEdit ? 'Edit' : (isSubBudget ? 'New sub-budget' : 'New')} ${production_id ? 'department budget' : isSubBudget ? 'sub-budget' : 'budget category'}</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Name <span class="req">*</span></label>
        <input type="text" id="b-name" class="form-input" value="${name}" placeholder="${isSubBudget ? 'e.g. Print, Digital, Social' : 'e.g. Marketing, Operations'}"></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Area / type</label>
          <input type="text" id="b-area" class="form-input" value="${area}" placeholder="e.g. Marketing, Admin"></div>
        <div class="form-group"><label class="form-label">Season</label>
          <input type="text" id="b-season" class="form-input" value="${season}" placeholder="e.g. 2024-2025"></div>
      </div>
      ${(isSubBudget || production_id) ? `
      <div class="form-group"><label class="form-label">Budget amount <span class="req">*</span></label>
        <input type="number" id="b-total" class="form-input" value="${total||''}" placeholder="0.00" step="0.01"></div>` : `
      <div class="panel mb-4" style="background:var(--teal3);border-color:var(--teal);padding:10px 14px;font-size:13px">
        💡 This creates a <strong>category container</strong>. Its total will be the sum of sub-budgets you add to it — no amount needed here.
      </div>
      <input type="hidden" id="b-total" value="0">`}
      ${!production_id && parentOpts ? `
      <div class="form-group">
        <label class="form-label">Parent category (optional)</label>
        <select id="b-parent" class="form-select">
          <option value="">Top-level category</option>
          ${parentOpts}
        </select>
        <div class="form-hint">Nest this under an existing category</div>
      </div>` : `<input type="hidden" id="b-parent" value="${parent_id||''}">`}
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveBudget(${id},${production_id||'null'})">${isEdit ? 'Save changes' : 'Create'}</button>
    </div>`;
  showModal(html);
}

async function saveBudget(id, production_id) {
  const name     = document.getElementById('b-name').value.trim();
  const parentEl = document.getElementById('b-parent');
  const totalEl  = document.getElementById('b-total');
  const parent_id = parentEl && parentEl.value ? parseInt(parentEl.value) : null;
  const isCategory = !production_id && !parent_id; // top-level org category = no amount needed
  const total_amount = isCategory ? 0 : parseFloat(totalEl?.value || 0);

  if (!name) { toast('Name is required', 'error'); return; }
  if (!isCategory && !total_amount) { toast('Please enter a budget amount', 'error'); return; }

  const data = {
    name,
    area: document.getElementById('b-area').value.trim(),
    season: document.getElementById('b-season').value.trim(),
    total_amount,
    production_id: production_id || null,
    parent_id,
    is_category: isCategory,
  };
  try {
    if (id) await api('PATCH', `/budgets/${id}`, data);
    else await api('POST', '/budgets', data);
    toast(id ? 'Budget updated!' : 'Created!', 'success');
    closeModal();
    await loadBudgets();
    renderBudgets();
  } catch(e) { toast(e.message, 'error'); }
}

async function archiveBudget(id) {
  await api('PATCH', `/budgets/${id}`, {is_active: 0});
  await loadBudgets(); renderBudgets(); toast('Budget archived.', 'info');
}
async function restoreBudget(id) {
  await api('PATCH', `/budgets/${id}`, {is_active: 1});
  await loadBudgets(); renderBudgets(); toast('Budget restored!', 'success');
}

function confirmDeleteBudget(id, name) {
  const html = `
    <div class="modal-header"><span class="modal-title">Delete budget</span><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <p class="text-sm">Are you sure you want to permanently delete <strong>${name}</strong>?</p>
      <p class="text-sm mt-8" style="color:var(--red)">This cannot be undone. Any purchase requests linked to this budget will lose their budget reference.</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" onclick="doDeleteBudget(${id})">Delete permanently</button>
    </div>`;
  showModal(html);
}

async function doDeleteBudget(id) {
  try {
    await api('DELETE', `/budgets/${id}`);
    toast('Budget deleted.', 'info');
    closeModal();
    await loadBudgets();
    renderBudgets();
  } catch(e) { toast(e.message, 'error'); }
}

async function createProduction() {
  const name   = document.getElementById('p-name').value.trim();
  const season = document.getElementById('p-season').value.trim();
  const budget = parseFloat(document.getElementById('p-budget').value||0);
  const desc   = document.getElementById('p-desc').value.trim();
  const errEl  = document.getElementById('p-error');
  errEl.classList.add('hidden');
  if (!name || !season) { errEl.textContent='Name and season are required'; errEl.classList.remove('hidden'); return; }
  try {
    const d = await api('POST', '/productions', {name, season, description:desc, total_budget:budget});

    closeModal();
    await loadBudgets();
    await renderProductions();
    openProductionDetail(d.id);
  } catch(e) { errEl.textContent=e.message; errEl.classList.remove('hidden'); }

const REVENUE_SOURCES = [
  'Ticket Sales', 'Concessions', 'Program Ads', 'Merchandise',
  'Grants', 'Donations', 'Sponsorships', 'Matching Gifts', 'Other'
];

async function renderRevenueTab() {
  const p = _currentProd;
  const canManage = ['admin','treasurer','president'].includes(currentUser.role) || p.i_am_producer;
  const tc = document.getElementById('prod-tab-content');
  tc.innerHTML = '<div class="text-xs text-muted">Loading revenue...</div>';

  try {
    const entries = await api('GET', `/productions/${p.id}/revenue`);
    const totalExpected = entries.reduce((s,r) => s+r.expected, 0);
    const totalActual   = entries.reduce((s,r) => s+r.actual, 0);
    const totalSpent    = p.total_spent || 0;
    const netCost       = totalSpent - totalActual;

    tc.innerHTML = `
      <!-- Summary bar -->
      <div class="card mb-16">
        <div class="card-body" style="display:grid;grid-template-columns:repeat(3,1fr);gap:0;text-align:center">
          <div style="padding:12px;border-right:1px solid var(--border)">
            <div class="text-xs text-muted mb-4">Total spend</div>
            <div class="fw-600" style="font-size:18px;color:var(--red)">${fmtMoney(totalSpent)}</div>
          </div>
          <div style="padding:12px;border-right:1px solid var(--border)">
            <div class="text-xs text-muted mb-4">Revenue received</div>
            <div class="fw-600" style="font-size:18px;color:var(--green)">${fmtMoney(totalActual)}</div>
            ${totalExpected > totalActual ? `<div class="text-xs text-muted">${fmtMoney(totalExpected)} projected</div>` : ''}
          </div>
          <div style="padding:12px">
            <div class="text-xs text-muted mb-4">Net cost</div>
            <div class="fw-600" style="font-size:18px;color:${netCost<0?'var(--green)':'var(--ink)'}">${fmtMoney(netCost)}</div>
            ${netCost < 0 ? '<div class="text-xs" style="color:var(--green)">surplus</div>' : ''}
          </div>
        </div>
      </div>

      ${canManage ? `<div class="flex mb-12">
        <button class="btn btn-primary btn-sm" style="margin-left:auto" onclick="showAddRevenueModal(${p.id})">+ Add revenue</button>
      </div>` : ''}

      ${entries.length === 0
        ? `<div class="empty"><div class="empty-icon">💵</div><h3>No revenue entries yet</h3><p>Track ticket sales, concessions, program ads, and other income for this production.</p></div>`
        : `<div class="table-wrap"><table>
            <thead><tr><th>Source</th><th>Description</th><th>Expected</th><th>Received</th><th>Date</th>${canManage?'<th></th>':''}</tr></thead>
            <tbody>${entries.map(r => `<tr>
              <td><div class="fw-600 text-sm">${r.source}</div></td>
              <td class="td-muted">${r.description||'—'}</td>
              <td class="fw-600">${fmtMoney(r.expected)}</td>
              <td class="fw-600" style="color:${r.actual>0?'var(--green)':'var(--ink3)'}">${fmtMoney(r.actual)}</td>
              <td class="td-muted">${r.received_date?fmtDate(r.received_date):'—'}</td>
              ${canManage?`<td>
                <div class="flex gap-6">
                  <button class="btn btn-outline btn-sm" onclick="showEditRevenueModal(${p.id},${JSON.stringify(r).replace(/"/g,'&quot;')})">Edit</button>
                  <button class="btn btn-danger btn-sm" onclick="deleteRevenue(${p.id},${r.id})">×</button>
                </div>
              </td>`:''}
            </tr>`).join('')}
            <tr style="border-top:2px solid var(--border)">
              <td colspan="2" class="fw-600">Totals</td>
              <td class="fw-600">${fmtMoney(totalExpected)}</td>
              <td class="fw-600" style="color:var(--green)">${fmtMoney(totalActual)}</td>
              <td colspan="${canManage?2:1}"></td>
            </tr>
            </tbody></table></div>`}`;
  } catch(e) {
    document.getElementById('prod-tab-content').innerHTML = `<div class="empty"><p>${e.message}</p></div>`;
  }
}

function toggleCustomSource(val) {
  document.getElementById('rev-custom-wrap').classList.toggle('hidden', val !== 'Other');
}

function getRevenueFormData() {
  const sourceEl = document.getElementById('rev-source');
  const customEl = document.getElementById('rev-custom');
  const source = sourceEl.value === 'Other' && customEl?.value.trim()
    ? customEl.value.trim() : sourceEl.value;
  return {
    source,
    description: document.getElementById('rev-desc').value.trim(),
    expected: parseFloat(document.getElementById('rev-expected').value || 0),
    actual:   parseFloat(document.getElementById('rev-actual').value || 0),
    received_date: document.getElementById('rev-date').value || null,
  };
}

async function saveRevenue(pid) {
  const data = getRevenueFormData();
  const errEl = document.getElementById('rev-error');
  errEl.classList.add('hidden');
  if (!data.source) { errEl.textContent='Source is required'; errEl.classList.remove('hidden'); return; }
  try {
    await api('POST', `/productions/${pid}/revenue`, data);
    toast('Revenue added!', 'success');
    closeModal();
    const prods = await api('GET', '/productions');
    _currentProd = prods.find(p => p.id === pid);
    renderRevenueTab();
  } catch(e) { errEl.textContent=e.message; errEl.classList.remove('hidden'); }
}

async function updateRevenue(pid, rid) {
  const data = getRevenueFormData();
  try {
    await api('PATCH', `/productions/${pid}/revenue/${rid}`, data);
    toast('Updated!', 'success');
    closeModal();
    const prods = await api('GET', '/productions');
    _currentProd = prods.find(p => p.id === pid);
    renderRevenueTab();
  } catch(e) { toast(e.message, 'error'); }
}

async function deleteRevenue(pid, rid) {
  try {
    await api('DELETE', `/productions/${pid}/revenue/${rid}`);
    toast('Removed.', 'info');
    const prods = await api('GET', '/productions');
    _currentProd = prods.find(p => p.id === pid);
    renderRevenueTab();
  } catch(e) { toast(e.message, 'error'); }
}

    await loadBudgets();
    const prods = await api('GET', '/productions');

                  : `<span class="badge badge-denied">Incomplete</span>${canManage?` <button class="btn btn-outline btn-sm" style="margin-left:6px" onclick="markTrained(${u.id})">Mark complete</button>`:''}`}
              </td>
              <td>${u.is_active===0
                  ? `<span class="badge badge-denied">Inactive</span>${canManage?` <button class="btn btn-outline btn-sm" style="margin-left:6px" onclick="setUserActive(${u.id},1)">Reactivate</button>`:''}`
                  : '<span class="badge badge-approved">Active</span>'}
              </td>
              <td class="td-muted">${fmtDate(u.created_at)}</td>
              ${canManage ? `<td><div class="flex gap-8">
                <button class="btn btn-outline btn-sm" onclick="showEditUserModal(${u.id},'${u.name.replace(/'/g,"\\'")}','${u.email}',${u.training_complete})">Edit</button>
                <button class="btn btn-outline btn-sm" onclick="showResetPasswordModal(${u.id},'${u.name.replace(/'/g,"\\'")}')">Password</button>
                <button class="btn btn-outline btn-sm" onclick="showReceiptLink(${u.id},'${u.name.replace(/'/g,"\\'")}')">📱 Receipt link</button>
                ${u.is_active!==0?`<button class="btn btn-danger btn-sm" onclick="setUserActive(${u.id},0)">Deactivate</button>`:''}
                <button class="btn btn-danger btn-sm" onclick="confirmDeleteUser(${u.id},'${u.name.replace(/'/g,"\\'")}')">Delete</button>
              </div></td>` : ''}
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="empty"><p>${e.message}</p></div>`;
  }
}

async function doEditUser(uid) {

function copyReceiptLink() {
  const val = document.getElementById('receipt-link-val');
  val.select();
  navigator.clipboard.writeText(val.value)
    .then(() => toast('Link copied!', 'success'))
    .catch(() => { document.execCommand('copy'); toast('Link copied!', 'success'); });
}

async function regenerateReceiptLink(uid, name) {
  if (!confirm(`Regenerate the receipt link for ${name}? Their old link will stop working.`)) return;
  try {
    const d = await api('POST', `/users/${uid}/receipt-token/regenerate`);
    document.getElementById('receipt-link-val').value = d.link;
    toast('Link regenerated!', 'success');
  } catch(e) { toast(e.message, 'error'); }
}

let trainingModule = null;
let currentSlide = 0;
let quizAnswers = {};
